<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Colors are applied from config.js via applyTheme() */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      line-height: 1.6;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      font-family: inherit;
      font-size: 15px;
      padding: 0.5rem 0.75rem;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
    }

    input[type="text"]:hover,
    input[type="email"]:hover,
    input[type="number"]:hover,
    select:hover,
    textarea:hover {
      border-color: var(--color-border-secondary);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-border-primary);
    }

    button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: var(--color-background-secondary);
    }

    button:active {
      transform: scale(0.98);
    }

    a {
      color: var(--color-text-info);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
      color: var(--color-text-primary);
    }

    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0 0 2rem 0;
    }

    .card {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-group input {
      flex: 1;
    }

    .input-group select {
      width: 140px;
    }

    .input-group button {
      min-width: 100px;
    }

    .quick-add {
      margin-top: 1rem;
    }

    .quick-add-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin: 0 0 0.75rem 0;
      display: block;
    }

    .quick-add-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .quick-add-btn {
      padding: 6px 12px;
      font-size: 13px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      white-space: nowrap;
    }

    .section-group {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .section-header {
      padding: 0.75rem 1.25rem;
      background: var(--color-background-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-header h3 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
      color: var(--color-text-primary);
    }

    .section-header button {
      background: transparent;
      border: none;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }

    .section-items {
      padding: 0.75rem;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      font-size: 15px;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .action-btn {
      font-size: 12px;
      padding: 4px 8px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      background: transparent;
    }

    .action-btn.find {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border: none;
    }

    .action-btn.copy {
      background: var(--color-background-secondary);
    }

    .action-btn.copy.copied {
      background: var(--color-background-success);
      color: var(--color-text-success);
    }

    .action-btn.heart {
      background: transparent;
    }

    .action-btn.delete {
      color: var(--color-text-danger);
    }

    /* Check-off */
    .item-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--color-text-success);
      padding: 0;
      margin-right: 10px;
      transition: background 0.15s, border-color 0.15s;
      min-height: unset;
      border-color: var(--color-border-secondary);
    }

    .item-check.checked {
      background: var(--color-background-success);
      border-color: var(--color-text-success);
    }

    .item-name {
      flex: 1;
      transition: opacity 0.2s;
    }

    .item-name.checked {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .list-header h2 {
      margin-bottom: 0;
    }

    .clear-checked-btn {
      font-size: 13px;
      padding: 4px 10px;
      color: var(--color-text-danger);
      border-color: var(--color-text-danger);
      opacity: 0.8;
    }

    .clear-checked-btn:hover {
      background: var(--color-background-danger);
    }

    .tags-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .tag button {
      background: transparent;
      border: none;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      margin-left: 4px;
    }

    .hidden {
      display: none !important;
    }

    .fav-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .fav-name {
      flex: 1;
    }

    .fav-section {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-left: 8px;
    }

    .fav-delete {
      background: transparent;
      border: none;
      color: var(--color-text-danger);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }

    .empty-state {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0;
    }

    .inline-add {
      display: flex;
      gap: 8px;
    }

    .inline-add input {
      flex: 1;
    }

    .status-bar {
      font-size: 12px;
      color: var(--color-text-tertiary);
      text-align: right;
      margin-bottom: 1rem;
    }

    .status-bar.error {
      color: var(--color-text-danger);
    }

    /* ------------------------------------------------------------------ */
    /* Theme picker                                                         */
    /* ------------------------------------------------------------------ */

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .app-header-text {
      flex: 1;
    }

    .app-header-text h1 {
      margin-bottom: 0.25rem;
    }

    .app-header-text .subtitle {
      margin-bottom: 0;
    }

    .theme-picker {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .theme-swatch:hover {
      transform: scale(1.15);
      background: none;
    }

    .theme-swatch.active {
      border-color: var(--color-text-primary);
      transform: scale(1.1);
    }

    .theme-swatch-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    /* ------------------------------------------------------------------ */
    /* Check-off animation                                                  */
    /* ------------------------------------------------------------------ */

    @keyframes checkBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.5); }
      60%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    @keyframes rowFlash {
      0%   { background: transparent; }
      30%  { background: var(--color-background-success); }
      100% { background: transparent; }
    }

    .item-check.bouncing {
      animation: checkBounce 0.35s ease forwards;
    }

    .item-row.flashing {
      animation: rowFlash 0.5s ease forwards;
      border-radius: var(--border-radius-md);
    }

    /* ------------------------------------------------------------------ */
    /* Progress bar                                                         */
    /* ------------------------------------------------------------------ */

    .progress-wrap {
      margin-bottom: 1.25rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    .progress-label .progress-pct {
      font-weight: 500;
      color: var(--color-text-success);
    }

    .progress-track {
      height: 8px;
      background: var(--color-background-tertiary);
      border-radius: 99px;
      overflow: hidden;
      border: 0.5px solid var(--color-border-tertiary);
    }

    .progress-fill {
      height: 100%;
      background: var(--color-text-success);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* ------------------------------------------------------------------ */
    /* Celebration overlay                                                  */
    /* ------------------------------------------------------------------ */

    .celebration {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .celebration.visible {
      opacity: 1;
      pointer-events: all;
    }

    .celebration-card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .celebration.visible .celebration-card {
      transform: scale(1);
    }

    .celebration-emoji {
      font-size: 56px;
      margin-bottom: 0.75rem;
      display: block;
    }

    .celebration-message {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-text-primary);
    }

    .celebration-sub {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 1.5rem;
    }

    .celebration-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 15px;
      background: var(--color-background-success);
      color: var(--color-text-success);
      border-color: var(--color-text-success);
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 998;
    }

    /* ------------------------------------------------------------------ */
    /* Encouragement toast                                                  */
    /* ------------------------------------------------------------------ */

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0)     scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    #encourageToast {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-background-success);
      color: var(--color-text-success);
      border: 0.5px solid var(--color-text-success);
      border-radius: 99px;
      padding: 0.5rem 1.25rem;
      font-size: 14px;
      font-weight: 500;
      z-index: 997;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    #encourageToast.in  { animation: toastIn  0.25s ease forwards; }
    #encourageToast.out { animation: toastOut 0.32s ease forwards; }

    /* ------------------------------------------------------------------ */
    /* Streak badge                                                         */
    /* ------------------------------------------------------------------ */

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 10px;
    }

    .streak-badge.hot {
      color: var(--color-text-danger);
    }

    /* Store name label — hidden on mobile, shown on desktop */
    .store-label {
      display: inline;
    }

    /* ------------------------------------------------------------------ */
    /* Focus mode                                                           */
    /* ------------------------------------------------------------------ */

    .focus-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--color-background-info);
      color: var(--color-text-info);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 0.6rem 1rem;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .focus-banner button {
      font-size: 12px;
      padding: 3px 10px;
      border-color: var(--color-text-info);
      color: var(--color-text-info);
    }

    .focus-banner button:hover {
      background: var(--color-background-primary);
    }

    .section-focus-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 0.5px solid var(--color-border-tertiary);
      color: var(--color-text-secondary);
      margin-right: 4px;
    }

    .section-focus-btn:hover {
      color: var(--color-text-info);
      border-color: var(--color-text-info);
      background: var(--color-background-info);
    }

    /* Item emoji */
    .item-emoji {
      margin-right: 6px;
      font-size: 17px;
      flex-shrink: 0;
    }

    /* Footer */
    .app-footer {
      text-align: center;
      font-size: 11px;
      color: var(--color-text-tertiary);
      padding: 1rem 0 0.5rem;
    }

    /* Inline section re-assignment picker */
    .item-section-select {
      font-size: 11px;
      padding: 2px 4px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-secondary);
      max-width: 90px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-section-select:hover {
      border-color: var(--color-border-secondary);
      color: var(--color-text-primary);
    }

    /* ------------------------------------------------------------------ */
    /* Mobile layout (≤ 520px)                                             */
    /* ------------------------------------------------------------------ */
    @media (max-width: 520px) {

      .container {
        padding: 1.25rem 1rem;
      }

      h1 {
        font-size: 22px;
      }

      .card {
        padding: 1.25rem 1rem;
        margin-bottom: 1.25rem;
      }

      /* Stack input group: text field full-width, then select + button row */
      .input-group {
        flex-wrap: wrap;
      }

      .input-group input {
        flex: 1 1 100%;
      }

      .input-group select {
        flex: 1;
        width: auto;
      }

      .input-group button {
        flex: 1;
        min-width: unset;
      }

      /* Ensure minimum 44px touch targets on all interactive elements */
      button,
      select,
      input[type="text"] {
        min-height: 44px;
      }

      .action-btn {
        min-height: 36px;
        padding: 6px 10px;
      }

      .item-section-select {
        max-width: 72px;
        font-size: 10px;
      }

      /* Hide "at Walmart" on small screens — button reads just "Find" */
      .store-label {
        display: none;
      }

      /* Section header — keep clear button from wrapping awkwardly */
      .section-header {
        padding: 0.6rem 1rem;
      }

      /* Inline-add form (new section): stack input above buttons */
      .inline-add {
        flex-wrap: wrap;
      }

      .inline-add input {
        flex: 1 1 100%;
      }

      /* Tighten section items on small screens */
      .section-items {
        padding: 0.5rem;
      }

      .item-row {
        padding: 0.6rem 0.5rem;
        gap: 6px;
      }

      /* Quick-add strip buttons: slightly larger tap area */
      .quick-add-btn {
        padding: 8px 14px;
        font-size: 14px;
      }

      /* Larger swatches for touch */
      .theme-swatch {
        width: 34px;
        height: 34px;
      }

    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <div class="app-header-text">
        <h1 id="appName"></h1>
        <p class="subtitle"><span id="appSubtitle"></span> <span id="itemCount">0</span> items, <span id="favCount">0</span> favorites.<span id="streakBadge" class="streak-badge hidden"></span></p>
      </div>
      <div id="themePicker" class="theme-picker"></div>
    </div>
    <div id="statusBar" class="status-bar hidden"></div>

    <!-- Add Item Section -->
    <div class="card">
      <h2 id="addCardTitle"></h2>
      <div class="input-group">
        <input
          type="text"
          id="newItem"
          name="newItem"
          aria-label="Item name"
          onkeydown="handleKeyPress(event)"
        />
        <select id="newSection" name="newSection" aria-label="Section"></select>
        <button id="addItemBtn" onclick="addItem()"></button>
      </div>

      <div id="quickAddContainer" class="hidden quick-add">
        <span id="quickAddLabel" class="quick-add-label"></span>
        <div id="quickAddButtons" class="quick-add-buttons"></div>
      </div>
    </div>

    <!-- Shopping List -->
    <div id="shoppingListContainer" class="hidden">
      <div class="list-header">
        <h2 id="listTitle"></h2>
        <button id="clearCheckedBtn" class="clear-checked-btn hidden" aria-label="Clear all checked items" onclick="clearCheckedItems()"></button>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="progressText"></span>
          <span id="progressPct" class="progress-pct"></span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
      <div id="focusBanner" class="focus-banner hidden">
        <span id="focusBannerText"></span>
        <button id="exitFocusBtn" onclick="exitFocus()">Exit focus</button>
      </div>
      <div id="shoppingList"></div>
    </div>

    <!-- Celebration overlay -->
    <div id="celebration" class="celebration" onclick="dismissCelebration()">
      <div class="celebration-card" onclick="event.stopPropagation()">
        <span id="celebrationEmoji" class="celebration-emoji"></span>
        <div id="celebrationMessage" class="celebration-message"></div>
        <div id="celebrationSub" class="celebration-sub"></div>
        <button class="celebration-btn" onclick="dismissCelebration()">Let's go again 🛒</button>
      </div>
    </div>

    <!-- Confetti canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Encouragement toast -->
    <div id="encourageToast" style="display:none"></div>

    <!-- Sections Manager -->
    <div class="card">
      <h2 id="sectionsTitle"></h2>
      <div id="sectionsContainer" class="tags-group"></div>
      <div id="addSectionForm" class="hidden inline-add">
        <input
          type="text"
          id="newSectionName"
          name="newSectionName"
          aria-label="Section name"
          onkeydown="handleSectionKeyPress(event)"
        />
        <button id="addSectionConfirmBtn" onclick="addNewSection()"></button>
        <button id="addSectionCancelBtn" onclick="cancelAddSection()"></button>
      </div>
      <button id="addSectionBtn" onclick="showAddSectionForm()"></button>
    </div>

    <!-- Favorites Manager -->
    <div class="card">
      <h2 id="favoritesTitle"></h2>
      <div id="favoritesContainer"></div>
    </div>

    <footer class="app-footer">
      <span id="appVersion"></span>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="strings.js"></script>
  <script>
    const SUPABASE_URL = 'https://lrmdawizqxfaoncddwnz.supabase.co';

    let items = [];
    let favorites = [];

    let isAddingItem = false;

    // --- Supabase helpers ---

    async function sb(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': options.prefer || '',
          ...options.headers
        },
        method: options.method || 'GET',
        body: options.body ? JSON.stringify(options.body) : undefined
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }

      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    function setStatus(msg, isError = false) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;

    // --- Data loading ---

    async function seedDefaultSections() {
      if (!CONFIG.defaultSections?.length) return;
      try {
        const inserts = CONFIG.defaultSections.map((name, i) => ({ name, position: i }));

          method: 'POST',
          prefer: 'return=representation',
          body: inserts
        });
        sections = created.map(s => s.name);
      } catch (e) {
        console.error('Failed to seed default sections:', e);
      }
    }

    async function loadData() {
      try {
        const [sects, favs, itms] = await Promise.all([
          sb('sections?order=position.asc,name.asc'),
          sb('favorites?order=created_at.asc'),
          sb('items?order=created_at.asc')
        ]);
        sections = sects.map(s => s.name);
        if (sections.length === 0) await seedDefaultSections();
        favorites = favs;
        items = itms;
        updateUI();
      } catch (e) {
        setStatus(t('status.noConnection'), true);
        console.error(e);
      }
    }

    // --- Items ---

    // Client-side categorization fallback — used when the edge function is unavailable.
    // Maps common item keywords to section concept labels, then finds the best match
    // in the user's actual section list (so "Dairy & Eggs" still matches "milk").
    const CATEGORY_KEYWORD_SETS = [
      { keywords: ['milk','cheese','yogurt','butter','cream','dairy','egg','eggs','kefir','whipping'], labels: ['dairy','refrigerat','eggs'] },
      { keywords: ['apple','banana','lettuce','tomato','onion','garlic','pepper','carrot','celery','spinach','broccoli','cucumber','potato','avocado','lemon','lime','orange','grape','berry','berries','peach','plum','mango','pineapple','melon','corn','zucchini','squash','kale','arugula','mushroom','herb','cilantro','parsley','basil','ginger','produce','fruit','vegetable'], labels: ['produce','fruit','veg','fresh'] },
      { keywords: ['chicken','beef','pork','turkey','salmon','fish','shrimp','steak','bacon','sausage','ham','lamb','tuna','crab','lobster','brisket','ribs','ground beef','ground turkey','meat','seafood','deli'], labels: ['meat','seafood','protein','deli'] },
      { keywords: ['frozen','ice cream','popsicle','waffle','pizza','edamame','tater tots','fries'], labels: ['frozen'] },
      { keywords: ['bread','pasta','rice','cereal','flour','sugar','oil','vinegar','sauce','soup','chips','crackers','coffee','tea','soda','water','juice','canned','beans','lentil','oat','granola','peanut butter','jelly','jam','honey','syrup','spice','salt','pepper','baking','snack','candy','chocolate','pantry'], labels: ['pantry','dry','grocery','staples','baking','snack','beverage'] },
    ];

    function fallbackCategorize(name) {
      const n = name.toLowerCase();
      for (const set of CATEGORY_KEYWORD_SETS) {
        if (set.keywords.some(k => n.includes(k))) {
          const match = sections.find(s =>
            set.labels.some(l => s.toLowerCase().includes(l))
          );
          if (match) return match;
        }
      }
      return null;
    }

    async function moveItemToSection(id, newSection) {
      const item = items.find(i => i.id === id);
      if (!item || item.section === newSection) return;
      try {
        await sb(`items?id=eq.${id}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: { section: newSection }
        });
        item.section = newSection;
        updateShoppingList();
      } catch (e) {
        setStatus(t('status.errorMoveItem'), true);
      }
    }

    async function categorizeItem(name) {
      if (!sections.length) return { section: null, emoji: '' };

      // Run client-side match first — it's deterministic and correct for common items.
      // The edge function has shown it returns wrong sections (e.g. Milk → Produce),
      // so we only use its section suggestion when the local matcher has no result.
      const localSection = fallbackCategorize(name);

      try {
        const res = await fetch(CATEGORIZE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({ item: name, sections })
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          console.warn('[categorize] edge function returned', res.status, res.statusText, errBody);
          return { section: localSection, emoji: '' };
        }
        const data = await res.json();
        console.log('[categorize]', name, '→ local:', localSection, '| edge:', data.section, '| emoji:', data.emoji);
        return {
          section: localSection || data.section || null,
          emoji: data.emoji || ''
        };
      } catch (e) {
        console.warn('[categorize] fetch failed:', e.message);
        return { section: localSection, emoji: '' };
      }
    }

    async function addItem() {
      if (isAddingItem) return;
      const input = document.getElementById('newItem');
      const sectionEl = document.getElementById('newSection');
      const name = input.value.trim();
      if (!name) return;

      isAddingItem = true;
      input.value = '';
      setStatus(t('status.categorizing'));

      try {
        const { section: suggested, emoji } = await categorizeItem(name);
        // Case-insensitive match so "dairy" matches "Dairy", etc.
        const matched = suggested
          ? sections.find(s => s.toLowerCase() === suggested.toLowerCase())
          : null;
        const section = matched || sectionEl.value;
        // Sync the dropdown to reflect the chosen section
        sectionEl.value = section;

        const [created] = await sb('items?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name, section, emoji }
        });
        if (!created) throw new Error('No item returned from insert');
        items.push(created);
        setStatus(t('status.addedTo', { section }));
        updateUI();
      } catch (e) {
        setStatus(t('status.errorAddItem'), true);
        console.error(e);
      } finally {
        isAddingItem = false;
      }
    }

    let toastTimer;

    function showEncouragement() {
      const total   = items.length;
      const checked = items.filter(i => i.checked).length;
      if (total === 0 || checked === total) return; // celebration handles the finish

      const pct  = checked / total;
      const pool = pct < 0.25 ? ENCOURAGEMENTS.early
                 : pct < 0.75 ? ENCOURAGEMENTS.middle
                 :               ENCOURAGEMENTS.late;
      const msg  = pool[Math.floor(Math.random() * pool.length)];

    // --- Streak ---

    function loadStreak() {
      try {
        return JSON.parse(localStorage.getItem('gc-streak')) || { count: 0, lastCompleted: null };
      } catch { return { count: 0, lastCompleted: null }; }
    }

    function saveStreak(data) {
      localStorage.setItem('gc-streak', JSON.stringify(data));
    }

    function updateStreak() {
      const streak  = loadStreak();
      const today   = new Date().toISOString().slice(0, 10);
      const last    = streak.lastCompleted ? new Date(streak.lastCompleted) : null;
      const now     = new Date(today);
      const daysDiff = last ? (now - last) / (1000 * 60 * 60 * 24) : Infinity;

      if (streak.lastCompleted === today) return; // already counted today

      const newCount = (daysDiff <= 9) ? streak.count + 1 : 1; // 9-day grace window
      saveStreak({ count: newCount, lastCompleted: today });
      renderStreakBadge(newCount);
    }

    function renderStreakBadge(count) {
      const badge = document.getElementById('streakBadge');
      if (!count || count < 1) {
        badge.classList.add('hidden');
        return;
      }
      const isHot = count >= 3;
      badge.className = 'streak-badge' + (isHot ? ' hot' : '');
      badge.textContent = isHot ? `🔥 ${count} trip streak` : `⚡ ${count} trip streak`;
    }

    function initStreak() {
      const { count } = loadStreak();
      renderStreakBadge(count);
    }

      { emoji: '🎉', message: 'YOU DID THE THING!',        sub: 'Future you is grateful.' },

    function updateProgressBar() {
      const total   = items.length;
      const checked = items.filter(i => i.checked).length;
      if (total === 0) return;

      const pct = Math.round((checked / total) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${checked} of ${total} items`;
      document.getElementById('progressPct').textContent  = pct + '%';
    }

    let confettiFrame;

    function launchConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      const ctx    = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors  = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#1dd1a1'];
      const pieces  = Array.from({ length: 90 }, () => ({
        x:     Math.random() * canvas.width,
        y:     Math.random() * canvas.height - canvas.height,
        w:     Math.random() * 10 + 5,
        h:     Math.random() * 6  + 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx:    (Math.random() - 0.5) * 3,
        vy:    Math.random() * 3 + 2,
        angle: Math.random() * 360,
        spin:  (Math.random() - 0.5) * 7,
      }));

      let elapsed = 0;
      cancelAnimationFrame(confettiFrame);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
          ctx.rotate(p.angle * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
          p.x     += p.vx;
          p.y     += p.vy;
          p.vy    += 0.07;
          p.angle += p.spin;
        });
        elapsed++;
        if (elapsed < 220) {
          confettiFrame = requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      draw();
    }

    function showCelebration() {
      const pick = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
      document.getElementById('celebrationEmoji').textContent   = pick.emoji;
      document.getElementById('celebrationMessage').textContent = pick.message;
      document.getElementById('celebrationSub').textContent     = pick.sub;
      document.getElementById('celebration').classList.add('visible');
      updateStreak();
      launchConfetti();
    }

    function dismissCelebration() {
      document.getElementById('celebration').classList.remove('visible');
      cancelAnimationFrame(confettiFrame);
      const canvas = document.getElementById('confettiCanvas');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    async function toggleCheck(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newVal = !item.checked;
      try {
        await sb(`items?id=eq.${id}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: { checked: newVal }
        });
        item.checked = newVal;

        // Animate the row immediately without full re-render
        const checkEl = document.getElementById(`check-${id}`);
        const rowEl   = document.getElementById(`row-${id}`);
        const nameEl  = document.getElementById(`name-${id}`);

        if (checkEl) {
          checkEl.classList.toggle('checked', newVal);
          checkEl.textContent = newVal ? '✓' : '';
          checkEl.setAttribute('aria-checked', newVal ? 'true' : 'false');
          checkEl.setAttribute('aria-label', (newVal ? 'Uncheck' : 'Check off') + ' ' + item.name);
          checkEl.classList.remove('bouncing');
          void checkEl.offsetWidth; // force reflow to restart animation
          checkEl.classList.add('bouncing');
        }
        if (rowEl && newVal)  {
          rowEl.classList.remove('flashing');
          void rowEl.offsetWidth;
          rowEl.classList.add('flashing');
        }
        if (nameEl) {
          nameEl.classList.toggle('checked', newVal);
        }

        updateProgressBar();
        // Show clear-checked button
        const anyChecked = items.some(i => i.checked);
        document.getElementById('clearCheckedBtn').classList.toggle('hidden', !anyChecked);
        // Update only the section count label — avoid a full re-render that would kill the animations
        const sectionGroupEl = document.getElementById(`row-${id}`)?.closest('.section-group');
        if (sectionGroupEl) {
          const sectionItems = items.filter(i => i.section === item.section);
          const unchecked = sectionItems.filter(i => !i.checked).length;
          const countEl = sectionGroupEl.querySelector('h3');
          if (countEl) countEl.textContent = `${item.section} (${unchecked}/${sectionItems.length})`;
        }

        // Encouragement on check (not uncheck)
        if (newVal) showEncouragement();

        // 🎉 Check if everything is done
        if (items.length > 0 && items.every(i => i.checked)) {
          setTimeout(showCelebration, 400);
        }

      } catch (e) {
        setStatus(t('status.errorToggleCheck'), true);
      }
    }

      if (!items.some(i => i.checked)) return;
      try {
        await sb('items?checked=eq.true', { method: 'DELETE' });

        await sb(`items?id=eq.${id}`, { method: 'DELETE' });

    async function addToFavorites(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      // Avoid duplicates
      if (favorites.some(f => f.name.toLowerCase() === item.name.toLowerCase())) {
        setStatus(t('status.alreadyFavorite', { name: item.name }));
        return;
      }
      try {
        const [created] = await sb('favorites?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name: item.name, section: item.section, emoji: item.emoji || '' }
        });
        if (!created) throw new Error('No favorite returned from insert');
        favorites.push(created);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorSaveFavorite'), true);
      }
    }

    async function addNewSection() {
      const input = document.getElementById('newSectionName');
      const name = input.value.trim();
      if (!name || sections.some(s => s.toLowerCase() === name.toLowerCase())) return;

      try {
        await sb('sections?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name, position: sections.length }
        });
        sections.push(name);
        input.value = '';
        updateUI();
        document.getElementById('addSectionForm').classList.add('hidden');
        document.getElementById('addSectionBtn').classList.remove('hidden');
      } catch (e) {
        setStatus(t('status.errorAddSection'), true);
      }
    }

    function showAddSectionForm() {
      document.getElementById('addSectionBtn').classList.add('hidden');
      document.getElementById('addSectionForm').classList.remove('hidden');
      document.getElementById('newSectionName').focus();
    }

    function cancelAddSection() {
      document.getElementById('addSectionForm').classList.add('hidden');
      document.getElementById('addSectionBtn').classList.remove('hidden');
    }

    // --- Utilities ---

    function resolveStore() {
      return CONFIG.customStore || STORES[CONFIG.activeStore] || STORES.walmart;
    }

    function generateStoreLink(itemName) {
      return resolveStore().searchUrl.replace('{query}', encodeURIComponent(itemName));
    }

    function copyToClipboard(text, id) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById(`copy-${id}`);
        btn.textContent = t('item.copied');
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = t('item.copy');
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        setStatus('Could not access clipboard.', true);
      });
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') addItem();
    }

    function handleSectionKeyPress(event) {
      if (event.key === 'Enter') addNewSection();
    }

    // --- UI Rendering ---

    function updateUI() {
      updateCounts();
      updateSectionSelect();
      updateShoppingList();
      updateProgressBar();
      updateSectionsManager();
      updateFavoritesUI();
      updateQuickAdd();
    }

    function updateCounts() {
      document.getElementById('itemCount').textContent = items.length;
      document.getElementById('favCount').textContent = favorites.length;
      document.getElementById('favCountDetail').textContent = favorites.length;
    }

    function updateSectionSelect() {
      const select = document.getElementById('newSection');
      const currentValue = select.value;
      select.innerHTML = '';
      sections.forEach(section => {
        const option = document.createElement('option');
        option.value = section;
        option.textContent = section;
        select.appendChild(option);
      });
      if (sections.includes(currentValue)) {
        select.value = currentValue;
      } else if (sections.length > 0) {
        select.value = sections[0];
      }
    }

    function updateShoppingList() {
      const container = document.getElementById('shoppingListContainer');
      const list = document.getElementById('shoppingList');

      if (items.length === 0) {
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      list.innerHTML = '';

      // Auto-exit focus if the focused section no longer has any items
      if (focusSection && !items.some(i => i.section === focusSection)) {
        focusSection = null;
      }

      // Show/hide "Clear checked" button
      const anyChecked = items.some(i => i.checked);
      document.getElementById('clearCheckedBtn').classList.toggle('hidden', !anyChecked);

      // Focus banner — always visible when list is shown
      const banner = document.getElementById('focusBanner');
      const exitFocusBtn = document.getElementById('exitFocusBtn');
      banner.classList.remove('hidden');
      if (focusSection) {
        document.getElementById('focusBannerText').textContent = `📍 Focusing on: ${focusSection}`;
        exitFocusBtn.classList.remove('hidden');
      } else {
        document.getElementById('focusBannerText').textContent = '📍 All sections';
        exitFocusBtn.classList.add('hidden');
      }

      const visibleSections = focusSection ? [focusSection] : sections;

      visibleSections.forEach(section => {
        const sectionItems = items.filter(item => item.section === section);
        if (sectionItems.length === 0) return;

        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section-group';

        const header = document.createElement('div');
        header.className = 'section-header';
        const uncheckedCount = sectionItems.filter(i => !i.checked).length;
        const h3 = document.createElement('h3');
        h3.textContent = `${section} (${uncheckedCount}/${sectionItems.length})`;
        header.appendChild(h3);

        const headerBtns = document.createElement('div');
        headerBtns.style.display = 'flex';
        headerBtns.style.gap = '6px';
        headerBtns.style.alignItems = 'center';

        if (!focusSection) {
          const focusBtn = document.createElement('button');
          focusBtn.className = 'section-focus-btn';
          focusBtn.textContent = 'Focus';
          focusBtn.setAttribute('aria-label', 'Focus on ' + section);
          focusBtn.onclick = () => enterFocus(section);
          headerBtns.appendChild(focusBtn);
        }

        const clearBtn = document.createElement('button');
        clearBtn.textContent = t('list.clearSection');
        clearBtn.setAttribute('aria-label', 'Clear all items from ' + section);
        clearBtn.onclick = () => clearSection(section);
        headerBtns.appendChild(clearBtn);
        header.appendChild(headerBtns);

        const itemsDiv = document.createElement('div');
        itemsDiv.className = 'section-items';

        sectionItems.forEach(item => {
          const row = document.createElement('div');
          row.className = 'item-row';
          row.id = `row-${item.id}`;

          const checkBtn = document.createElement('button');
          checkBtn.className = 'item-check' + (item.checked ? ' checked' : '');
          checkBtn.id = `check-${item.id}`;
          checkBtn.textContent = item.checked ? '✓' : '';
          checkBtn.setAttribute('role', 'checkbox');
          checkBtn.setAttribute('aria-checked', item.checked ? 'true' : 'false');
          checkBtn.setAttribute('aria-label', (item.checked ? 'Uncheck' : 'Check off') + ' ' + item.name);
          checkBtn.onclick = () => toggleCheck(item.id);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'item-name' + (item.checked ? ' checked' : '');
          nameSpan.id = `name-${item.id}`;
          if (item.emoji) {
            const emojiSpan = document.createElement('span');
            emojiSpan.className = 'item-emoji';
            emojiSpan.textContent = item.emoji;
            nameSpan.appendChild(emojiSpan);
          }
          nameSpan.appendChild(document.createTextNode(item.name));

          const actions = document.createElement('div');
          actions.className = 'item-actions';

          const findLink = document.createElement('a');
          findLink.href = generateStoreLink(item.name);
          findLink.target = '_blank';
          findLink.rel = 'noopener noreferrer';
          findLink.className = 'action-btn find';
          findLink.appendChild(document.createTextNode('Find '));
          const storeLabel = document.createElement('span');
          storeLabel.className = 'store-label';
          storeLabel.textContent = `at ${resolveStore().name}`;
          findLink.appendChild(storeLabel);

          const copyBtn = document.createElement('button');
          copyBtn.id = `copy-${item.id}`;
          copyBtn.className = 'action-btn copy';
          copyBtn.textContent = t('item.copy');
          copyBtn.onclick = () => copyToClipboard(item.name, item.id);

          const heartBtn = document.createElement('button');
          heartBtn.className = 'action-btn heart';
          heartBtn.setAttribute('aria-label', t('item.favorite') + ': ' + item.name);
          heartBtn.textContent = '♡';
          heartBtn.onclick = () => addToFavorites(item.id);

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'action-btn delete';
          deleteBtn.setAttribute('aria-label', 'Delete ' + item.name);
          deleteBtn.textContent = t('item.delete');
          deleteBtn.onclick = () => deleteItem(item.id);

          const sectionPicker = document.createElement('select');
          sectionPicker.className = 'item-section-select';
          sectionPicker.id   = `section-picker-${item.id}`;
          sectionPicker.name = `section-picker-${item.id}`;
          sectionPicker.setAttribute('aria-label', 'Move ' + item.name + ' to section');
          sections.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            if (s === item.section) opt.selected = true;
            sectionPicker.appendChild(opt);
          });
          sectionPicker.onchange = () => moveItemToSection(item.id, sectionPicker.value);

          actions.append(sectionPicker, findLink, copyBtn, heartBtn, deleteBtn);
          row.append(checkBtn, nameSpan, actions);
          itemsDiv.appendChild(row);
        });

        sectionDiv.appendChild(header);
        sectionDiv.appendChild(itemsDiv);
        list.appendChild(sectionDiv);
      });
    }

    function updateSectionsManager() {
      const container = document.getElementById('sectionsContainer');
      container.innerHTML = '';
      sections.forEach(section => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        const label = document.createElement('span');
        label.textContent = section;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.setAttribute('aria-label', 'Remove section ' + section);
        btn.onclick = () => deleteSection(section);
        tag.append(label, btn);
        container.appendChild(tag);
      });
    }

    function updateFavoritesUI() {
      const container = document.getElementById('favoritesContainer');
      if (favorites.length === 0) {
        const emptyP = document.createElement('p');
        emptyP.className = 'empty-state';
        emptyP.textContent = t('favorites.emptyState');
        container.appendChild(emptyP);
        return;
      }
      container.innerHTML = '';
      const list = document.createElement('div');
      list.className = 'fav-list';
      favorites.forEach(fav => {
        const item = document.createElement('div');
        item.className = 'fav-item';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'fav-name';
        const favNameSpan = document.createElement('span');
        favNameSpan.textContent = fav.name;
        const favSectionSpan = document.createElement('span');
        favSectionSpan.className = 'fav-section';
        favSectionSpan.textContent = fav.section;
        nameDiv.append(favNameSpan, favSectionSpan);
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'fav-delete';
        deleteBtn.textContent = '✕';
        deleteBtn.setAttribute('aria-label', 'Remove ' + fav.name + ' from favorites');
        deleteBtn.onclick = () => removeFavorite(fav.id);
        item.append(nameDiv, deleteBtn);
        list.appendChild(item);
      });
      container.appendChild(list);
    }

    function updateQuickAdd() {
      const container = document.getElementById('quickAddContainer');
      const buttons = document.getElementById('quickAddButtons');
      if (favorites.length === 0) {
        container.classList.add('hidden');
        return;
      }
      container.classList.remove('hidden');
      buttons.innerHTML = '';
      favorites.slice(0, 8).forEach(fav => {
        const btn = document.createElement('button');
        btn.className = 'quick-add-btn';
        btn.textContent = fav.emoji ? `${fav.emoji} ${fav.name}` : `+ ${fav.name}`;
        btn.onclick = () => addFavoriteToList(fav.id);
        buttons.appendChild(btn);
      });
    }

    // Initialize
    loadSavedTheme();
    applyTheme();
    applyIdentity();
    renderThemePicker();
    initStreak();
    loadData();
  </script>
</body>
</html>
