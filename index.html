<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Companion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Colors are applied from config.js via applyTheme() */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      line-height: 1.6;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      font-family: inherit;
      font-size: 15px;
      padding: 0.5rem 0.75rem;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
    }

    input[type="text"]:hover,
    input[type="email"]:hover,
    input[type="number"]:hover,
    select:hover,
    textarea:hover {
      border-color: var(--color-border-secondary);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-border-primary);
    }

    button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: all 0.15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      background: var(--color-background-secondary);
    }

    button:active {
      transform: scale(0.98);
    }

    a {
      color: var(--color-text-info);
      text-decoration: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
      color: var(--color-text-primary);
    }

    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0 0 2rem 0;
    }

    .card {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-group input {
      flex: 1;
    }

    .input-group select {
      width: 140px;
    }

    .input-group button {
      min-width: 100px;
    }

    .quick-add {
      margin-top: 1rem;
    }

    .quick-add-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin: 0 0 0.75rem 0;
      display: block;
    }

    .quick-add-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .quick-add-btn {
      padding: 6px 12px;
      font-size: 13px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      white-space: nowrap;
    }

    .section-group {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .section-header {
      padding: 0.75rem 1.25rem;
      background: var(--color-background-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-header h3 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
      color: var(--color-text-primary);
    }

    .section-header button {
      background: transparent;
      border: none;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }

    .section-items {
      padding: 0.75rem;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      font-size: 15px;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .action-btn {
      font-size: 12px;
      padding: 4px 8px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      background: transparent;
    }

    .action-btn.find {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border: none;
    }

    .action-btn.copy {
      background: var(--color-background-secondary);
    }

    .action-btn.copy.copied {
      background: var(--color-background-success);
      color: var(--color-text-success);
    }

    .action-btn.heart {
      background: transparent;
    }

    .action-btn.delete {
      color: var(--color-text-danger);
    }

    /* Check-off */
    .item-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--color-text-success);
      padding: 0;
      margin-right: 10px;
      transition: background 0.15s, border-color 0.15s;
      min-height: unset;
      border-color: var(--color-border-secondary);
    }

    .item-check.checked {
      background: var(--color-background-success);
      border-color: var(--color-text-success);
    }

    .item-name {
      flex: 1;
      transition: opacity 0.2s;
    }

    .item-name.checked {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .list-header h2 {
      margin-bottom: 0;
    }

    .clear-checked-btn {
      font-size: 13px;
      padding: 4px 10px;
      color: var(--color-text-danger);
      border-color: var(--color-text-danger);
      opacity: 0.8;
    }

    .clear-checked-btn:hover {
      background: var(--color-background-danger);
    }

    .tags-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .tag button {
      background: transparent;
      border: none;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      margin-left: 4px;
    }

    .hidden {
      display: none;
    }

    .fav-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .fav-name {
      flex: 1;
    }

    .fav-section {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-left: 8px;
    }

    .fav-delete {
      background: transparent;
      border: none;
      color: var(--color-text-danger);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }

    .empty-state {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0;
    }

    .inline-add {
      display: flex;
      gap: 8px;
    }

    .inline-add input {
      flex: 1;
    }

    .status-bar {
      font-size: 12px;
      color: var(--color-text-tertiary);
      text-align: right;
      margin-bottom: 1rem;
    }

    .status-bar.error {
      color: var(--color-text-danger);
    }

    /* ------------------------------------------------------------------ */
    /* Theme picker                                                         */
    /* ------------------------------------------------------------------ */

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .app-header-text {
      flex: 1;
    }

    .app-header-text h1 {
      margin-bottom: 0.25rem;
    }

    .app-header-text .subtitle {
      margin-bottom: 0;
    }

    .theme-picker {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .theme-swatch:hover {
      transform: scale(1.15);
      background: none;
    }

    .theme-swatch.active {
      border-color: var(--color-text-primary);
      transform: scale(1.1);
    }

    .theme-swatch-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    /* Store name label — hidden on mobile, shown on desktop */
    .store-label {
      display: inline;
    }

    /* ------------------------------------------------------------------ */
    /* Mobile layout (≤ 520px)                                             */
    /* ------------------------------------------------------------------ */
    @media (max-width: 520px) {

      .container {
        padding: 1.25rem 1rem;
      }

      h1 {
        font-size: 22px;
      }

      .card {
        padding: 1.25rem 1rem;
        margin-bottom: 1.25rem;
      }

      /* Stack input group: text field full-width, then select + button row */
      .input-group {
        flex-wrap: wrap;
      }

      .input-group input {
        flex: 1 1 100%;
      }

      .input-group select {
        flex: 1;
        width: auto;
      }

      .input-group button {
        flex: 1;
        min-width: unset;
      }

      /* Ensure minimum 44px touch targets on all interactive elements */
      button,
      select,
      input[type="text"] {
        min-height: 44px;
      }

      .action-btn {
        min-height: 36px;
        padding: 6px 10px;
      }

      /* Hide "at Walmart" on small screens — button reads just "Find" */
      .store-label {
        display: none;
      }

      /* Section header — keep clear button from wrapping awkwardly */
      .section-header {
        padding: 0.6rem 1rem;
      }

      /* Inline-add form (new section): stack input above buttons */
      .inline-add {
        flex-wrap: wrap;
      }

      .inline-add input {
        flex: 1 1 100%;
      }

      /* Tighten section items on small screens */
      .section-items {
        padding: 0.5rem;
      }

      .item-row {
        padding: 0.6rem 0.5rem;
        gap: 6px;
      }

      /* Quick-add strip buttons: slightly larger tap area */
      .quick-add-btn {
        padding: 8px 14px;
        font-size: 14px;
      }

      /* Larger swatches for touch */
      .theme-swatch {
        width: 34px;
        height: 34px;
      }

    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <div class="app-header-text">
        <h1 id="appName"></h1>
        <p class="subtitle"><span id="appSubtitle"></span> <span id="itemCount">0</span> items, <span id="favCount">0</span> favorites.</p>
      </div>
      <div id="themePicker" class="theme-picker"></div>
    </div>
    <div id="statusBar" class="status-bar hidden"></div>

    <!-- Add Item Section -->
    <div class="card">
      <h2 id="addCardTitle"></h2>
      <div class="input-group">
        <input
          type="text"
          id="newItem"
          onkeypress="handleKeyPress(event)"
        />
        <select id="newSection"></select>
        <button id="addItemBtn" onclick="addItem()"></button>
      </div>

      <div id="quickAddContainer" class="hidden quick-add">
        <label id="quickAddLabel" class="quick-add-label"></label>
        <div id="quickAddButtons" class="quick-add-buttons"></div>
      </div>
    </div>

    <!-- Shopping List -->
    <div id="shoppingListContainer" class="hidden">
      <div class="list-header">
        <h2 id="listTitle"></h2>
        <button id="clearCheckedBtn" class="clear-checked-btn hidden" onclick="clearCheckedItems()"></button>
      </div>
      <div id="shoppingList"></div>
    </div>

    <!-- Sections Manager -->
    <div class="card">
      <h2 id="sectionsTitle"></h2>
      <div id="sectionsContainer" class="tags-group"></div>
      <div id="addSectionForm" class="hidden inline-add">
        <input
          type="text"
          id="newSectionName"
          onkeypress="handleSectionKeyPress(event)"
        />
        <button id="addSectionConfirmBtn" onclick="addNewSection()"></button>
        <button id="addSectionCancelBtn" onclick="cancelAddSection()"></button>
      </div>
      <button id="addSectionBtn" onclick="showAddSectionForm()"></button>
    </div>

    <!-- Favorites Manager -->
    <div class="card">
      <h2 id="favoritesTitle"></h2>
      <div id="favoritesContainer"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="strings.js"></script>
  <script>
    const SUPABASE_URL = 'https://lrmdawizqxfaoncddwnz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxybWRhd2l6cXhmYW9uY2Rkd256Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjI2MDYsImV4cCI6MjA4OTU5ODYwNn0.jlPZgYiGC71jZVWZg_ub0WxFO53ONF42PApk3AsUEUw';
    const CATEGORIZE_URL = `${SUPABASE_URL}/functions/v1/categorize-item`;

    // --- Config bootstrap ---

    function applyTheme() {
      const preset = CONFIG.customTheme || THEMES[CONFIG.activeTheme] || THEMES.sage;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const t = prefersDark ? preset.dark : preset.light;
      const root = document.documentElement;
      root.style.setProperty('--color-background-primary',   t.backgroundPrimary);
      root.style.setProperty('--color-background-secondary', t.backgroundSecondary);
      root.style.setProperty('--color-background-tertiary',  t.backgroundTertiary);
      root.style.setProperty('--color-background-info',      t.backgroundInfo);
      root.style.setProperty('--color-background-success',   t.backgroundSuccess);
      root.style.setProperty('--color-background-danger',    t.backgroundDanger);
      root.style.setProperty('--color-text-primary',         t.textPrimary);
      root.style.setProperty('--color-text-secondary',       t.textSecondary);
      root.style.setProperty('--color-text-tertiary',        t.textTertiary);
      root.style.setProperty('--color-text-info',            t.textInfo);
      root.style.setProperty('--color-text-success',         t.textSuccess);
      root.style.setProperty('--color-text-danger',          t.textDanger);
      root.style.setProperty('--color-border-tertiary',      t.borderTertiary);
      root.style.setProperty('--color-border-secondary',     t.borderSecondary);
      root.style.setProperty('--color-border-primary',       t.borderPrimary);
    }

    function applyIdentity() {
      document.title = CONFIG.app.name;
      document.getElementById('appName').textContent = CONFIG.app.name;
      document.getElementById('appSubtitle').textContent = CONFIG.app.subtitle;

      // Static UI labels from strings
      document.getElementById('addCardTitle').textContent        = t('addCard.title');
      document.getElementById('newItem').placeholder             = t('addCard.placeholder');
      document.getElementById('addItemBtn').textContent          = t('addCard.addBtn');
      document.getElementById('quickAddLabel').textContent       = t('quickAdd.label');
      document.getElementById('listTitle').textContent           = t('list.title');
      document.getElementById('sectionsTitle').textContent       = t('sections.title');
      document.getElementById('newSectionName').placeholder      = t('sections.placeholder');
      document.getElementById('addSectionConfirmBtn').textContent = t('sections.addBtn');
      document.getElementById('addSectionCancelBtn').textContent = t('sections.cancelBtn');
      document.getElementById('addSectionBtn').textContent       = t('sections.newBtn');
      document.getElementById('favoritesTitle').innerHTML        =
        `${t('favorites.title')} (<span id="favCountDetail">0</span>)`;
      document.getElementById('clearCheckedBtn').textContent     = t('list.clearChecked');
    }

    // Re-apply theme if user switches system preference while the tab is open
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      applyTheme();
      renderThemePicker();
    });

    // Swatch preview colors per theme (always light variant for consistency)
    const THEME_PREVIEWS = {
      sage:   { bg: '#f0ede8', accent: '#185fa5' },
      ocean:  { bg: '#e4eff9', accent: '#0059a8' },
      berry:  { bg: '#ede8f8', accent: '#5a20c0' },
      forest: { bg: '#e6efe4', accent: '#2a6018' },
    };

    function setTheme(key) {
      CONFIG.activeTheme = key;
      localStorage.setItem('gc-theme', key);
      applyTheme();
      renderThemePicker();
    }

    function loadSavedTheme() {
      const saved = localStorage.getItem('gc-theme');
      if (saved && THEMES[saved]) {
        CONFIG.activeTheme = saved;
      }
    }

    function renderThemePicker() {
      const picker = document.getElementById('themePicker');
      picker.innerHTML = '';
      Object.keys(THEMES).forEach(key => {
        const preview = THEME_PREVIEWS[key];
        const btn = document.createElement('button');
        btn.className = 'theme-swatch' + (CONFIG.activeTheme === key ? ' active' : '');
        btn.title = key.charAt(0).toUpperCase() + key.slice(1);
        btn.setAttribute('aria-label', `${btn.title} theme`);
        btn.onclick = () => setTheme(key);

        const inner = document.createElement('div');
        inner.className = 'theme-swatch-inner';
        inner.style.background =
          `linear-gradient(135deg, ${preview.bg} 50%, ${preview.accent} 50%)`;

        btn.appendChild(inner);
        picker.appendChild(btn);
      });
    }

    let items = [];
    let favorites = [];
    let sections = [];

    // --- Supabase helpers ---

    async function sb(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': options.prefer || '',
          ...options.headers
        },
        method: options.method || 'GET',
        body: options.body ? JSON.stringify(options.body) : undefined
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }

      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    function setStatus(msg, isError = false) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = 'status-bar' + (isError ? ' error' : '');
      bar.classList.remove('hidden');
      if (!isError) setTimeout(() => bar.classList.add('hidden'), 2500);
    }

    // --- Data loading ---

    async function loadData() {
      try {
        const [sects, favs, itms] = await Promise.all([
          sb('sections?order=position.asc,name.asc'),
          sb('favorites?order=created_at.asc'),
          sb('items?order=created_at.asc')
        ]);
        sections = sects.map(s => s.name);
        favorites = favs;
        items = itms;
        updateUI();
      } catch (e) {
        setStatus(t('status.noConnection'), true);
        console.error(e);
      }
    }

    // --- Items ---

    async function categorizeItem(name) {
      try {
        const res = await fetch(CATEGORIZE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ item: name, sections })
        });
        const data = await res.json();
        return data.section || null;
      } catch (e) {
        return null;
      }
    }

    async function addItem() {
      const input = document.getElementById('newItem');
      const sectionEl = document.getElementById('newSection');
      const name = input.value.trim();
      if (!name) return;

      input.value = '';
      setStatus(t('status.categorizing'));

      const suggested = await categorizeItem(name);
      if (suggested && sections.includes(suggested)) {
        sectionEl.value = suggested;
      }

      try {
        const [created] = await sb('items?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name, section: sectionEl.value }
        });
        items.push(created);
        setStatus(t('status.addedTo', { section: sectionEl.value }));
        updateUI();
      } catch (e) {
        setStatus(t('status.errorAddItem'), true);
        console.error(e);
      }
    }

    async function toggleCheck(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newVal = !item.checked;
      try {
        await sb(`items?id=eq.${id}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: { checked: newVal }
        });
        item.checked = newVal;
        updateUI();
      } catch (e) {
        setStatus(t('status.errorToggleCheck'), true);
      }
    }

    async function clearCheckedItems() {
      try {
        await sb('items?checked=eq.true', { method: 'DELETE' });
        items = items.filter(i => !i.checked);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorDeleteItem'), true);
      }
    }

    async function deleteItem(id) {
      try {
        await sb(`items?id=eq.${id}`, { method: 'DELETE' });
        items = items.filter(i => i.id !== id);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorDeleteItem'), true);
      }
    }

    async function clearSection(sectionName) {
      try {
        await sb(`items?section=eq.${encodeURIComponent(sectionName)}`, { method: 'DELETE' });
        items = items.filter(i => i.section !== sectionName);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorClearSection'), true);
      }
    }

    // --- Favorites ---

    async function addToFavorites(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      // Avoid duplicates
      if (favorites.some(f => f.name.toLowerCase() === item.name.toLowerCase())) {
        setStatus(t('status.alreadyFavorite', { name: item.name }));
        return;
      }
      try {
        const [created] = await sb('favorites?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name: item.name, section: item.section }
        });
        favorites.push(created);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorSaveFavorite'), true);
      }
    }

    async function removeFavorite(id) {
      try {
        await sb(`favorites?id=eq.${id}`, { method: 'DELETE' });
        favorites = favorites.filter(f => f.id !== id);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorRemoveFavorite'), true);
      }
    }

    async function addFavoriteToList(favId) {
      const fav = favorites.find(f => f.id === favId);
      if (!fav) return;
      try {
        const [created] = await sb('items?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name: fav.name, section: fav.section }
        });
        items.push(created);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorAddItem'), true);
      }
    }

    // --- Sections ---

    async function deleteSection(sectionName) {
      try {
        await sb(`sections?name=eq.${encodeURIComponent(sectionName)}`, { method: 'DELETE' });
        await sb(`items?section=eq.${encodeURIComponent(sectionName)}`, { method: 'DELETE' });
        sections = sections.filter(s => s !== sectionName);
        items = items.filter(i => i.section !== sectionName);
        updateUI();
      } catch (e) {
        setStatus(t('status.errorDeleteSection'), true);
      }
    }

    async function addNewSection() {
      const input = document.getElementById('newSectionName');
      const name = input.value.trim();
      if (!name || sections.includes(name)) return;

      try {
        await sb('sections?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name, position: sections.length }
        });
        sections.push(name);
        input.value = '';
        updateUI();
        document.getElementById('addSectionForm').classList.add('hidden');
        document.getElementById('addSectionBtn').classList.remove('hidden');
      } catch (e) {
        setStatus(t('status.errorAddSection'), true);
      }
    }

    function showAddSectionForm() {
      document.getElementById('addSectionBtn').classList.add('hidden');
      document.getElementById('addSectionForm').classList.remove('hidden');
      document.getElementById('newSectionName').focus();
    }

    function cancelAddSection() {
      document.getElementById('addSectionForm').classList.add('hidden');
      document.getElementById('addSectionBtn').classList.remove('hidden');
    }

    // --- Utilities ---

    function resolveStore() {
      return CONFIG.customStore || STORES[CONFIG.activeStore] || STORES.walmart;
    }

    function generateStoreLink(itemName) {
      return resolveStore().searchUrl.replace('{query}', encodeURIComponent(itemName));
    }

    function copyToClipboard(text, id) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById(`copy-${id}`);
        btn.textContent = t('item.copied');
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = t('item.copy');
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') addItem();
    }

    function handleSectionKeyPress(event) {
      if (event.key === 'Enter') addNewSection();
    }

    // --- UI Rendering ---

    function updateUI() {
      updateCounts();
      updateSectionSelect();
      updateShoppingList();
      updateSectionsManager();
      updateFavoritesUI();
      updateQuickAdd();
    }

    function updateCounts() {
      document.getElementById('itemCount').textContent = items.length;
      document.getElementById('favCount').textContent = favorites.length;
      document.getElementById('favCountDetail').textContent = favorites.length;
    }

    function updateSectionSelect() {
      const select = document.getElementById('newSection');
      const currentValue = select.value;
      select.innerHTML = '';
      sections.forEach(section => {
        const option = document.createElement('option');
        option.value = section;
        option.textContent = section;
        select.appendChild(option);
      });
      if (sections.includes(currentValue)) {
        select.value = currentValue;
      } else if (sections.length > 0) {
        select.value = sections[0];
      }
    }

    function updateShoppingList() {
      const container = document.getElementById('shoppingListContainer');
      const list = document.getElementById('shoppingList');

      if (items.length === 0) {
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      list.innerHTML = '';

      // Show/hide "Clear checked" button
      const anyChecked = items.some(i => i.checked);
      document.getElementById('clearCheckedBtn').classList.toggle('hidden', !anyChecked);

      sections.forEach(section => {
        const sectionItems = items.filter(item => item.section === section);
        if (sectionItems.length === 0) return;

        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section-group';

        const header = document.createElement('div');
        header.className = 'section-header';
        const uncheckedCount = sectionItems.filter(i => !i.checked).length;
        header.innerHTML = `<h3>${section} (${uncheckedCount}/${sectionItems.length})</h3>`;

        const clearBtn = document.createElement('button');
        clearBtn.textContent = t('list.clearSection');
        clearBtn.onclick = () => clearSection(section);
        header.appendChild(clearBtn);

        const itemsDiv = document.createElement('div');
        itemsDiv.className = 'section-items';

        sectionItems.forEach(item => {
          const row = document.createElement('div');
          row.className = 'item-row';

          const checkBtn = document.createElement('button');
          checkBtn.className = 'item-check' + (item.checked ? ' checked' : '');
          checkBtn.textContent = item.checked ? '✓' : '';
          checkBtn.title = item.checked ? 'Uncheck' : 'Check off';
          checkBtn.onclick = () => toggleCheck(item.id);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'item-name' + (item.checked ? ' checked' : '');
          nameSpan.textContent = item.name;

          const actions = document.createElement('div');
          actions.className = 'item-actions';

          const findLink = document.createElement('a');
          findLink.href = generateStoreLink(item.name);
          findLink.target = '_blank';
          findLink.rel = 'noopener noreferrer';
          findLink.className = 'action-btn find';
          findLink.innerHTML = `Find <span class="store-label">at ${resolveStore().name}</span>`;

          const copyBtn = document.createElement('button');
          copyBtn.id = `copy-${item.id}`;
          copyBtn.className = 'action-btn copy';
          copyBtn.textContent = t('item.copy');
          copyBtn.onclick = () => copyToClipboard(item.name, item.id);

          const heartBtn = document.createElement('button');
          heartBtn.className = 'action-btn heart';
          heartBtn.title = t('item.favorite');
          heartBtn.textContent = '♡';
          heartBtn.onclick = () => addToFavorites(item.id);

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'action-btn delete';
          deleteBtn.textContent = t('item.delete');
          deleteBtn.onclick = () => deleteItem(item.id);

          actions.append(findLink, copyBtn, heartBtn, deleteBtn);
          row.append(checkBtn, nameSpan, actions);
          itemsDiv.appendChild(row);
        });

        sectionDiv.appendChild(header);
        sectionDiv.appendChild(itemsDiv);
        list.appendChild(sectionDiv);
      });
    }

    function updateSectionsManager() {
      const container = document.getElementById('sectionsContainer');
      container.innerHTML = '';
      sections.forEach(section => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        const label = document.createElement('span');
        label.textContent = section;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.onclick = () => deleteSection(section);
        tag.append(label, btn);
        container.appendChild(tag);
      });
    }

    function updateFavoritesUI() {
      const container = document.getElementById('favoritesContainer');
      if (favorites.length === 0) {
        container.innerHTML = `<p class="empty-state">${t('favorites.emptyState')}</p>`;
        return;
      }
      container.innerHTML = '';
      const list = document.createElement('div');
      list.className = 'fav-list';
      favorites.forEach(fav => {
        const item = document.createElement('div');
        item.className = 'fav-item';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'fav-name';
        nameDiv.innerHTML = `<span>${fav.name}</span><span class="fav-section">${fav.section}</span>`;
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'fav-delete';
        deleteBtn.textContent = '✕';
        deleteBtn.onclick = () => removeFavorite(fav.id);
        item.append(nameDiv, deleteBtn);
        list.appendChild(item);
      });
      container.appendChild(list);
    }

    function updateQuickAdd() {
      const container = document.getElementById('quickAddContainer');
      const buttons = document.getElementById('quickAddButtons');
      if (favorites.length === 0) {
        container.classList.add('hidden');
        return;
      }
      container.classList.remove('hidden');
      buttons.innerHTML = '';
      favorites.slice(0, 8).forEach(fav => {
        const btn = document.createElement('button');
        btn.className = 'quick-add-btn';
        btn.textContent = `+ ${fav.name}`;
        btn.onclick = () => addFavoriteToList(fav.id);
        buttons.appendChild(btn);
      });
    }

    // Initialize
    loadSavedTheme();
    applyTheme();
    applyIdentity();
    renderThemePicker();
    loadData();
  </script>
</body>
</html>
