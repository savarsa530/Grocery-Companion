<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Companion</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f0ede8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Grocery">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Colors are applied from config.js via applyTheme() */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      line-height: 1.6;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      font-family: inherit;
      font-size: 15px;
      padding: 0.5rem 0.75rem;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      transition: border-color 0.2s;
    }

    input[type="text"]:hover,
    input[type="email"]:hover,
    input[type="number"]:hover,
    select:hover,
    textarea:hover {
      border-color: var(--color-border-secondary);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-border-primary);
    }

    button {
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-primary);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: var(--color-background-secondary);
    }

    button:active {
      transform: scale(0.98);
    }

    a {
      color: var(--color-text-info);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin: 0 0 0.5rem 0;
      color: var(--color-text-primary);
    }

    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0 0 2rem 0;
    }

    .card {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 1rem 0;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-group input {
      flex: 1;
    }

    .input-group select {
      width: 140px;
    }

    .input-group button {
      min-width: 100px;
    }

    .quick-add {
      margin-top: 1rem;
    }

    .quick-add-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin: 0 0 0.75rem 0;
      display: block;
    }

    .quick-add-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .quick-add-btn {
      padding: 6px 12px;
      font-size: 13px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      white-space: nowrap;
    }

    .section-group {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .section-header {
      padding: 0.75rem 1.25rem;
      background: var(--color-background-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-header h3 {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
      color: var(--color-text-primary);
    }

    .section-header button {
      background: transparent;
      border: none;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }

    .section-items {
      padding: 0.75rem;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      font-size: 15px;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .action-btn {
      font-size: 12px;
      padding: 4px 8px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      background: transparent;
    }

    .action-btn.find {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border: none;
    }

    .action-btn.copy {
      background: var(--color-background-secondary);
    }

    .action-btn.copy.copied {
      background: var(--color-background-success);
      color: var(--color-text-success);
    }

    .action-btn.heart {
      background: transparent;
    }

    .action-btn.delete {
      color: var(--color-text-danger);
    }

    /* Check-off */
    .item-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--color-text-success);
      padding: 0;
      margin-right: 10px;
      transition: background 0.15s, border-color 0.15s;
      min-height: unset;
    }

    .item-check.checked {
      background: var(--color-background-success);
      border-color: var(--color-text-success);
    }

    .item-name {
      flex: 1;
      transition: opacity 0.2s;
    }

    .item-name.checked {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .list-header h2 {
      margin-bottom: 0;
    }

    .clear-checked-btn {
      font-size: 13px;
      padding: 4px 10px;
      color: var(--color-text-danger);
      border-color: var(--color-text-danger);
      opacity: 0.8;
    }

    .clear-checked-btn:hover {
      background: var(--color-background-danger);
    }

    .tags-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .tag button {
      background: transparent;
      border: none;
      color: var(--color-text-tertiary);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      margin-left: 4px;
    }

    .hidden {
      display: none !important;
    }

    .fav-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .fav-name {
      flex: 1;
    }

    .fav-section {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-left: 8px;
    }

    .fav-delete {
      background: transparent;
      border: none;
      color: var(--color-text-danger);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }

    .empty-state {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin: 0;
    }

    .inline-add {
      display: flex;
      gap: 8px;
    }

    .inline-add input {
      flex: 1;
    }

    .status-bar {
      font-size: 12px;
      color: var(--color-text-tertiary);
      text-align: right;
      margin-bottom: 1rem;
    }

    .status-bar.error {
      color: var(--color-text-danger);
    }

    /* ------------------------------------------------------------------ */
    /* Theme picker                                                         */
    /* ------------------------------------------------------------------ */

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .app-header-text {
      flex: 1;
    }

    .app-header-text h1 {
      margin-bottom: 0.25rem;
    }

    .app-header-text .subtitle {
      margin-bottom: 0;
    }

    .theme-picker {
      display: flex;
      gap: 8px;
      align-items: center;
      padding-top: 4px;
      flex-shrink: 0;
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .theme-swatch:hover {
      transform: scale(1.15);
      background: none;
    }

    .theme-swatch.active {
      border-color: var(--color-text-primary);
      transform: scale(1.1);
    }

    .theme-swatch-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    /* ------------------------------------------------------------------ */
    /* Check-off animation                                                  */
    /* ------------------------------------------------------------------ */

    @keyframes checkBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.5); }
      60%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    @keyframes rowFlash {
      0%   { background: transparent; }
      30%  { background: var(--color-background-success); }
      100% { background: transparent; }
    }

    .item-check.bouncing {
      animation: checkBounce 0.35s ease forwards;
    }

    .item-row.flashing {
      animation: rowFlash 0.5s ease forwards;
      border-radius: var(--border-radius-md);
    }

    /* ------------------------------------------------------------------ */
    /* Progress bar                                                         */
    /* ------------------------------------------------------------------ */

    .progress-wrap {
      margin-bottom: 1.25rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    .progress-label .progress-pct {
      font-weight: 500;
      color: var(--color-text-success);
    }

    .progress-track {
      height: 8px;
      background: var(--color-background-tertiary);
      border-radius: 99px;
      overflow: hidden;
      border: 0.5px solid var(--color-border-tertiary);
    }

    .progress-fill {
      height: 100%;
      background: var(--color-text-success);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* ------------------------------------------------------------------ */
    /* Celebration overlay                                                  */
    /* ------------------------------------------------------------------ */

    .celebration {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .celebration.visible {
      opacity: 1;
      pointer-events: all;
    }

    .celebration-card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .celebration.visible .celebration-card {
      transform: scale(1);
    }

    .celebration-emoji {
      font-size: 56px;
      margin-bottom: 0.75rem;
      display: block;
    }

    .celebration-message {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--color-text-primary);
    }

    .celebration-sub {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 1.5rem;
    }

    .celebration-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 15px;
      background: var(--color-background-success);
      color: var(--color-text-success);
      border-color: var(--color-text-success);
    }

    #confettiCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 998;
    }

    /* ------------------------------------------------------------------ */
    /* Encouragement toast                                                  */
    /* ------------------------------------------------------------------ */

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0)     scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    #encourageToast {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-background-success);
      color: var(--color-text-success);
      border: 0.5px solid var(--color-text-success);
      border-radius: 99px;
      padding: 0.5rem 1.25rem;
      font-size: 14px;
      font-weight: 500;
      z-index: 997;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    #encourageToast.in  { animation: toastIn  0.25s ease forwards; }
    #encourageToast.out { animation: toastOut 0.32s ease forwards; }

    /* ------------------------------------------------------------------ */
    /* Streak badge                                                         */
    /* ------------------------------------------------------------------ */

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-left: 10px;
    }

    .streak-badge.hot {
      color: var(--color-text-danger);
    }

    /* Store name label — hidden on mobile, shown on desktop */
    .store-label {
      display: inline;
    }

    /* ------------------------------------------------------------------ */
    /* Focus mode                                                           */
    /* ------------------------------------------------------------------ */

    .focus-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--color-background-info);
      color: var(--color-text-info);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 0.6rem 1rem;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .focus-banner button {
      font-size: 12px;
      padding: 3px 10px;
      border-color: var(--color-text-info);
      color: var(--color-text-info);
    }

    .focus-banner button:hover {
      background: var(--color-background-primary);
    }

    .section-focus-btn {
      font-size: 11px;
      padding: 2px 8px;
      border: 0.5px solid var(--color-border-tertiary);
      color: var(--color-text-secondary);
      margin-right: 4px;
    }

    .section-focus-btn:hover {
      color: var(--color-text-info);
      border-color: var(--color-text-info);
      background: var(--color-background-info);
    }

    /* Item note (recipe measurement or manual annotation) */
    .item-note {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-left: 5px;
      font-style: italic;
    }

    .item-name.checked .item-note { opacity: 0.6; }

    /* Item emoji */
    .item-emoji {
      margin-right: 6px;
      font-size: 17px;
      flex-shrink: 0;
    }

    /* Footer */
    .app-footer {
      text-align: center;
      font-size: 11px;
      color: var(--color-text-tertiary);
      padding: 1rem 0 0.5rem;
    }

    /* Section collapse chevron */
    .section-collapse-icon {
      font-size: 10px;
      color: var(--color-text-tertiary);
      transition: transform 0.2s;
      margin-right: 6px;
      display: inline-block;
    }

    .section-group.collapsed .section-collapse-icon {
      transform: rotate(-90deg);
    }

    .section-group.collapsed .section-items {
      display: none;
    }

    .section-header {
      cursor: pointer;
      user-select: none;
    }

    /* Copy list button */
    .copy-list-btn {
      font-size: 13px;
      padding: 4px 10px;
      color: var(--color-text-info);
      border-color: var(--color-text-info);
      opacity: 0.8;
    }

    .copy-list-btn:hover {
      background: var(--color-background-info);
    }

    /* ------------------------------------------------------------------ */
    /* Item quantity stepper                                               */
    /* ------------------------------------------------------------------ */

    .item-qty {
      display: flex;
      align-items: center;
      background: var(--color-background-tertiary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      overflow: hidden;
      flex-shrink: 0;
      margin-right: 6px;
    }

    .item-qty-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--color-text-secondary);
      font-size: 15px;
      font-weight: 600;
      padding: 0;
      cursor: pointer;
      flex-shrink: 0;
      min-height: unset;
      line-height: 1;
    }

    .item-qty-btn:hover {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
    }

    .item-qty-value {
      min-width: 22px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-primary);
      padding: 0 2px;
      pointer-events: none;
      user-select: none;
    }

    /* Inline section re-assignment picker */
    .item-section-select {
      font-size: 11px;
      padding: 2px 4px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      background: transparent;
      color: var(--color-text-secondary);
      max-width: 90px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-section-select:hover {
      border-color: var(--color-border-secondary);
      color: var(--color-text-primary);
    }

    /* ------------------------------------------------------------------ */
    /* Recipe import                                                        */
    /* ------------------------------------------------------------------ */

    .import-toggle-btn {
      font-size: 12px;
      padding: 3px 10px;
      color: var(--color-text-secondary);
      border-color: var(--color-border-tertiary);
      margin-top: 0.5rem;
    }

    .import-toggle-btn:hover { color: var(--color-text-primary); }

    .recipe-import-panel {
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recipe-import-panel textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      font-size: 14px;
      line-height: 1.5;
    }

    .recipe-import-actions { display: flex; gap: 8px; }

    /* ------------------------------------------------------------------ */
    /* Templates                                                            */
    /* ------------------------------------------------------------------ */

    .save-template-btn {
      font-size: 13px;
      padding: 4px 10px;
      color: var(--color-text-secondary);
      border-color: var(--color-border-tertiary);
    }

    .template-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .template-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      font-size: 14px;
    }

    .template-meta { flex: 1; }

    .template-name { font-weight: 500; }

    .template-count {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 2px;
    }

    .template-actions { display: flex; gap: 6px; align-items: center; }

    .template-load-btn {
      font-size: 12px;
      padding: 3px 10px;
      background: var(--color-background-info);
      color: var(--color-text-info);
      border: none;
    }

    .template-delete-btn {
      background: transparent;
      border: none;
      color: var(--color-text-danger);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
    }

    .save-template-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .save-template-card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      width: min(320px, 90vw);
    }

    .save-template-card h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    .save-template-card input { width: 100%; margin-bottom: 0.75rem; }

    .save-template-modal-actions { display: flex; gap: 8px; }

    /* ------------------------------------------------------------------ */
    /* Drag-and-drop                                                        */
    /* ------------------------------------------------------------------ */

    .item-drag-handle {
      color: var(--color-text-tertiary);
      cursor: grab;
      padding: 4px 8px 4px 0;
      font-size: 13px;
      flex-shrink: 0;
      opacity: 0.4;
      transition: opacity 0.15s;
      user-select: none;
    }

    .item-drag-handle:hover { opacity: 1; }
    .item-drag-handle:active { cursor: grabbing; }
    .item-row.dragging { opacity: 0.35; }

    .item-row.drag-over-above { box-shadow: inset 0 2px 0 var(--color-text-info); }
    .item-row.drag-over-below { box-shadow: inset 0 -2px 0 var(--color-text-info); }
    .section-header.drag-over { background: var(--color-background-info); color: var(--color-text-info); }

    /* ------------------------------------------------------------------ */
    /* Mobile layout (≤ 520px)                                             */
    /* ------------------------------------------------------------------ */
    @media (max-width: 520px) {

      .container {
        padding: 1.25rem 1rem;
      }

      h1 {
        font-size: 22px;
      }

      .card {
        padding: 1.25rem 1rem;
        margin-bottom: 1.25rem;
      }

      /* Stack input group: text field full-width, then select + button row */
      .input-group {
        flex-wrap: wrap;
      }

      .input-group input {
        flex: 1 1 100%;
      }

      .input-group select {
        flex: 1;
        width: auto;
      }

      .input-group button {
        flex: 1;
        min-width: unset;
      }

      /* Ensure minimum 44px touch targets on all interactive elements */
      button,
      select,
      input[type="text"] {
        min-height: 44px;
      }

      .action-btn {
        min-height: 36px;
        padding: 6px 10px;
      }

      .item-section-select {
        max-width: 72px;
        font-size: 10px;
      }

      .item-qty-btn {
        width: 28px;
        height: 28px;
      }

      /* Hide "at Walmart" on small screens — button reads just "Find" */
      .store-label {
        display: none;
      }

      /* Section header — keep clear button from wrapping awkwardly */
      .section-header {
        padding: 0.6rem 1rem;
      }

      /* Inline-add form (new section): stack input above buttons */
      .inline-add {
        flex-wrap: wrap;
      }

      .inline-add input {
        flex: 1 1 100%;
      }

      /* Tighten section items on small screens */
      .section-items {
        padding: 0.5rem;
      }

      .item-row {
        padding: 0.6rem 0.5rem;
        gap: 6px;
      }

      /* Quick-add strip buttons: slightly larger tap area */
      .quick-add-btn {
        padding: 8px 14px;
        font-size: 14px;
      }

      /* Larger swatches for touch */
      .theme-swatch {
        width: 34px;
        height: 34px;
      }

    }
  </style>
</head>
<body>
  <main class="container">
    <div class="app-header">
      <div class="app-header-text">
        <h1 id="appName"></h1>
        <p class="subtitle"><span id="appSubtitle"></span> <span id="itemCount">0</span> items, <span id="favCount">0</span> favorites.<span id="streakBadge" class="streak-badge hidden"></span></p>

          <button id="copyListBtn" class="copy-list-btn" aria-label="Copy full list to clipboard" onclick="copyFullList()"></button>

        <span id="focusBannerText"></span>

      <div id="shoppingList"></div>
    </div>

    <!-- Save-template modal -->
    <div id="saveTemplateModal" class="save-template-modal hidden" onclick="closeSaveTemplateModal()">
      <div class="save-template-card" onclick="event.stopPropagation()">
        <h3 id="saveTemplateModalTitle"></h3>
        <input
          type="text"
          id="templateNameInput"
          name="templateNameInput"
          aria-label="Template name"
          onkeydown="if(event.key==='Enter')confirmSaveTemplate();if(event.key==='Escape')closeSaveTemplateModal();"
        />
        <div class="save-template-modal-actions">
          <button id="saveTemplateConfirmBtn" onclick="confirmSaveTemplate()"></button>
          <button id="saveTemplateCancelBtn" onclick="closeSaveTemplateModal()"></button>
        </div>

    <!-- Celebration overlay -->
    <div id="celebration" class="celebration" role="alertdialog" aria-modal="true" onclick="dismissCelebration()">

    <!-- Encouragement toast -->

    <!-- Sections Manager -->
    <div class="card">
      <h2 id="sectionsTitle"></h2>
      <div id="sectionsContainer" class="tags-group"></div>

    </div>

    <footer class="app-footer">
      <span id="appVersion"></span>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="strings.js"></script>
  <script>
    const SUPABASE_URL = 'https://lrmdawizqxfaoncddwnz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxybWRhd2l6cXhmYW9uY2Rkd256Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjI2MDYsImV4cCI6MjA4OTU5ODYwNn0.jlPZgYiGC71jZVWZg_ub0WxFO53ONF42PApk3AsUEUw';
    const CATEGORIZE_URL    = `${SUPABASE_URL}/functions/v1/categorize-item`;
    const PARSE_RECIPE_URL  = `${SUPABASE_URL}/functions/v1/parse-recipe`;

    // --- Config bootstrap ---

    function applyTheme() {
      const preset = CONFIG.customTheme || THEMES[CONFIG.activeTheme] || THEMES.sage;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const t = prefersDark ? preset.dark : preset.light;
      const root = document.documentElement;
      root.style.setProperty('--color-background-primary',   t.backgroundPrimary);
      root.style.setProperty('--color-background-secondary', t.backgroundSecondary);
      root.style.setProperty('--color-background-tertiary',  t.backgroundTertiary);
      root.style.setProperty('--color-background-info',      t.backgroundInfo);
      root.style.setProperty('--color-background-success',   t.backgroundSuccess);
      root.style.setProperty('--color-background-danger',    t.backgroundDanger);
      root.style.setProperty('--color-text-primary',         t.textPrimary);
      root.style.setProperty('--color-text-secondary',       t.textSecondary);
      root.style.setProperty('--color-text-tertiary',        t.textTertiary);
      root.style.setProperty('--color-text-info',            t.textInfo);
      root.style.setProperty('--color-text-success',         t.textSuccess);
      root.style.setProperty('--color-text-danger',          t.textDanger);
      root.style.setProperty('--color-border-tertiary',      t.borderTertiary);
      root.style.setProperty('--color-border-secondary',     t.borderSecondary);
      root.style.setProperty('--color-border-primary',       t.borderPrimary);
    }

    function applyIdentity() {
      document.documentElement.lang = CONFIG.locale || 'en';
      document.title = CONFIG.app.name;
      document.getElementById('appName').textContent = CONFIG.app.name;
      document.getElementById('appSubtitle').textContent = CONFIG.app.subtitle;

      // Static UI labels from strings
      document.getElementById('addCardTitle').textContent        = t('addCard.title');
      document.getElementById('newItem').placeholder             = t('addCard.placeholder');
      document.getElementById('addItemBtn').textContent          = t('addCard.addBtn');
      document.getElementById('quickAddLabel').textContent       = t('quickAdd.label');
      document.getElementById('listTitle').textContent           = t('list.title');
      document.getElementById('sectionsTitle').textContent       = t('sections.title');
      document.getElementById('newSectionName').placeholder      = t('sections.placeholder');
      document.getElementById('addSectionConfirmBtn').textContent = t('sections.addBtn');
      document.getElementById('addSectionCancelBtn').textContent = t('sections.cancelBtn');
      document.getElementById('addSectionBtn').textContent       = t('sections.newBtn');
      document.getElementById('favoritesTitle').innerHTML        =
        `${t('favorites.title')} (<span id="favCountDetail">0</span>)`;
      document.getElementById('clearCheckedBtn').textContent      = t('list.clearChecked');
      document.getElementById('copyListBtn').textContent         = t('list.copyList');
      document.getElementById('saveTemplateBtn').textContent     = t('templates.saveBtn');
      document.getElementById('importToggleBtn').textContent     = t('recipe.toggleBtn');
      document.getElementById('importBtn').textContent           = t('recipe.importBtn');
      document.getElementById('importCancelBtn').textContent     = t('recipe.cancelBtn');
      document.getElementById('recipeInput').placeholder        = t('recipe.placeholder');
      document.getElementById('templatesTitle').textContent      = t('templates.title');
      document.getElementById('saveTemplateModalTitle').textContent = t('templates.modalTitle');
      document.getElementById('saveTemplateConfirmBtn').textContent = t('templates.confirmBtn');
      document.getElementById('saveTemplateCancelBtn').textContent  = t('templates.cancelBtn');
      document.getElementById('templateNameInput').placeholder   = t('templates.namePlaceholder');
      document.getElementById('celebrationBtn').textContent      = t('celebration.btn');
      document.getElementById('appVersion').textContent          = `v${CONFIG.app.version}`;
    }

    // Re-apply theme if user switches system preference while the tab is open
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      applyTheme();
      renderThemePicker();
    });

    // Swatch preview colors — derived from each theme's light variant so they never drift out of sync
    const THEME_PREVIEWS = Object.fromEntries(
      Object.entries(THEMES).map(([key, theme]) => [
        key,
        { bg: theme.light.backgroundTertiary, accent: theme.light.textInfo }
      ])
    );

    function setTheme(key) {
      CONFIG.activeTheme = key;
      localStorage.setItem('gc-theme', key);
      applyTheme();
      renderThemePicker();
    }

    function loadSavedTheme() {
      const saved = localStorage.getItem('gc-theme');
      if (saved && THEMES[saved]) {
        CONFIG.activeTheme = saved;
      }
    }

    function renderThemePicker() {
      const picker = document.getElementById('themePicker');
      const themeKeys = Object.keys(THEMES);

      // If buttons already exist, just update active state — avoid rebuilding & leaking listeners
      if (picker.children.length === themeKeys.length) {
        Array.from(picker.children).forEach(btn => {
          const key = btn.dataset.themeKey;
          const isActive = CONFIG.activeTheme === key;
          btn.className = 'theme-swatch' + (isActive ? ' active' : '');
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
        return;
      }

      picker.innerHTML = '';
      themeKeys.forEach(key => {
        const preview = THEME_PREVIEWS[key];
        const btn = document.createElement('button');
        btn.className = 'theme-swatch' + (CONFIG.activeTheme === key ? ' active' : '');
        btn.title = key.charAt(0).toUpperCase() + key.slice(1);
        btn.setAttribute('aria-label', `${btn.title} theme`);
        btn.setAttribute('aria-pressed', CONFIG.activeTheme === key ? 'true' : 'false');
        btn.dataset.themeKey = key;
        btn.onclick = () => setTheme(key);

        const inner = document.createElement('div');
        inner.className = 'theme-swatch-inner';
        inner.style.background =
          `linear-gradient(135deg, ${preview.bg} 50%, ${preview.accent} 50%)`;

        btn.appendChild(inner);
        picker.appendChild(btn);
      });
    }

    let items = [];
    let favorites = [];
    let sections = [];
    let templates = [];
    let isAddingItem = false;
    let isBulkAdding = false;   // guards importRecipe + loadTemplate against concurrent runs
    const collapsedSections = new Set();

    // Drag-and-drop state
    let draggedItemId = null;
    let draggedItemSection = null;

    // --- Supabase helpers ---

    async function sb(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': options.prefer || '',
          ...options.headers
        },
        method: options.method || 'GET',
        body: options.body ? JSON.stringify(options.body) : undefined
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }

      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    function setStatus(msg, isError = false) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = 'status-bar' + (isError ? ' error' : '');
      bar.classList.remove('hidden');
      setTimeout(() => bar.classList.add('hidden'), isError ? 8000 : 2500);
    }

    // --- Data loading ---

    async function seedDefaultSections() {
      if (!CONFIG.defaultSections?.length) return;
      try {
        const inserts = CONFIG.defaultSections.map((name, i) => ({ name, position: i }));
        const created = await sb('sections?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: inserts
        });
        sections = created.map(s => s.name);
      } catch (e) {
        console.error('Failed to seed default sections:', e);
      }
    }

    async function loadData() {
      try {
        const [sects, favs, itms, tmps] = await Promise.all([
          sb('sections?order=position.asc,name.asc'),
          sb('favorites?order=created_at.asc'),
          sb('items?order=position.asc,created_at.asc'),
          sb('templates?order=created_at.asc'),
        ]);
        sections = sects.map(s => s.name);
        if (sections.length === 0) await seedDefaultSections();
        favorites = favs;
        items = itms;
        templates = tmps || [];

        // Ensure sequential positions per section (for items that pre-date DnD)
        const sectionPos = {};
        items.forEach(item => {
          const sec = item.section;
          sectionPos[sec] ??= 0;
          if (item.position === 0 && sectionPos[sec] > 0) item.position = sectionPos[sec];
          sectionPos[sec]++;
        });

        updateUI();
      } catch (e) {
        setStatus(t('status.noConnection'), true);
        console.error(e);
      }
    }

    // --- Items ---

    // Client-side categorization fallback — used when the edge function is unavailable.
    // Maps common item keywords to section concept labels, then finds the best match
    // in the user's actual section list (so "Dairy & Eggs" still matches "milk").
    const CATEGORY_KEYWORD_SETS = [
      { keywords: ['milk','cheese','yogurt','butter','cream','dairy','egg','eggs','kefir','whipping'], labels: ['dairy','refrigerat','eggs'] },
      { keywords: ['apple','banana','lettuce','tomato','onion','garlic','pepper','carrot','celery','spinach','broccoli','cucumber','potato','avocado','lemon','lime','orange','grape','berry','berries','peach','plum','mango','pineapple','melon','corn','zucchini','squash','kale','arugula','mushroom','herb','cilantro','parsley','basil','ginger','produce','fruit','vegetable'], labels: ['produce','fruit','veg','fresh'] },
      { keywords: ['chicken','beef','pork','turkey','salmon','fish','shrimp','steak','bacon','sausage','ham','lamb','tuna','crab','lobster','brisket','ribs','ground beef','ground turkey','meat','seafood','deli'], labels: ['meat','seafood','protein','deli'] },
      { keywords: ['frozen','ice cream','popsicle','waffle','pizza','edamame','tater tots','fries'], labels: ['frozen'] },
      { keywords: ['bread','pasta','rice','cereal','flour','sugar','oil','vinegar','sauce','soup','chips','crackers','coffee','tea','soda','water','juice','canned','beans','lentil','oat','granola','peanut butter','jelly','jam','honey','syrup','spice','salt','pepper','baking','snack','candy','chocolate','pantry'], labels: ['pantry','dry','grocery','staples','baking','snack','beverage'] },
    ];

    function fallbackCategorize(name) {
      const n = name.toLowerCase();
      for (const set of CATEGORY_KEYWORD_SETS) {
        if (set.keywords.some(k => n.includes(k))) {
          const match = sections.find(s =>
            set.labels.some(l => s.toLowerCase().includes(l))
          );
          if (match) return match;
        }
      }
      return null;
    }

    async function moveItemToSection(id, newSection) {
      const item = items.find(i => i.id === id);
      if (!item || item.section === newSection) return;
      try {
        await sb(`items?id=eq.${id}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: { section: newSection }
        });
        item.section = newSection;
        updateShoppingList();
      } catch (e) {
        setStatus(t('status.errorMoveItem'), true);
      }
    }

    async function categorizeItem(name) {
      if (!sections.length) return { section: null, emoji: '' };

      // Run client-side match first — it's deterministic and correct for common items.
      // The edge function has shown it returns wrong sections (e.g. Milk → Produce),
      // so we only use its section suggestion when the local matcher has no result.
      const localSection = fallbackCategorize(name);

      try {
        const res = await fetch(CATEGORIZE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({ item: name, sections })
        });
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          console.warn('[categorize] edge function returned', res.status, res.statusText, errBody);
          return { section: localSection, emoji: '' };
        }
        const data = await res.json();
        console.log('[categorize]', name, '→ local:', localSection, '| edge:', data.section, '| emoji:', data.emoji);
        return {
          section: localSection || data.section || null,
          emoji: data.emoji || ''
        };
      } catch (e) {
        console.warn('[categorize] fetch failed:', e.message);
        return { section: localSection, emoji: '' };
      }
    }

    async function addItem() {
      if (isAddingItem) return;
      const input = document.getElementById('newItem');
      const sectionEl = document.getElementById('newSection');
      const name = input.value.trim();
      if (!name) return;

      isAddingItem = true;
      input.value = '';
      setStatus(t('status.categorizing'));

      try {
        const { section: suggested, emoji } = await categorizeItem(name);
        // Case-insensitive match so "dairy" matches "Dairy", etc.
        const matched = suggested
          ? sections.find(s => s.toLowerCase() === suggested.toLowerCase())
          : null;
        const section = matched || sectionEl.value;
        // Sync the dropdown to reflect the chosen section
        sectionEl.value = section;

        const sectionPos = items.filter(i => i.section === section);
        const position = sectionPos.length > 0 ? Math.max(...sectionPos.map(i => i.position || 0)) + 1 : 0;
        const insertResult = await sb('items?select=*', {
          method: 'POST',
          prefer: 'return=representation',
          body: { name, section, emoji, position }
        });
        const created = Array.isArray(insertResult) ? insertResult[0] : null;
        if (!created) throw new Error('No item returned from insert');
        items.push(created);
        setStatus(t('status.addedTo', { section }));
        updateUI();
      } catch (e) {
        setStatus(t('status.errorAddItem'), true);
        console.error(e);
      } finally {
        isAddingItem = false;
      }
    }

    // --- Encouragement messages (defined in strings.js) ---

    function getDict() { return STRINGS[CONFIG.locale || 'en'] || STRINGS.en; }
    const ENCOURAGEMENTS = getDict().encouragements;

    let toastTimer;

    function showEncouragement() {
      const total   = items.length;
      const checked = items.filter(i => i.checked).length;
      if (total === 0 || checked === total) return; // celebration handles the finish

      const pct  = checked / total;
      const pool = pct < 0.25 ? ENCOURAGEMENTS.early
                 : pct < 0.75 ? ENCOURAGEMENTS.middle
                 :               ENCOURAGEMENTS.late;
      const msg  = pool[Math.floor(Math.random() * pool.length)];

      const toast = document.getElementById('encourageToast');
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.style.display = 'block';
      toast.className = 'in';

      toastTimer = setTimeout(() => {
        toast.className = 'out';
        setTimeout(() => { toast.style.display = 'none'; toast.className = ''; }, 320);
      }, 1600);
    }

    // --- Streak ---

    function loadStreak() {
      try {
        return JSON.parse(localStorage.getItem('gc-streak')) || { count: 0, lastCompleted: null };
      } catch { return { count: 0, lastCompleted: null }; }
    }

    function saveStreak(data) {
      localStorage.setItem('gc-streak', JSON.stringify(data));
    }

    function updateStreak() {
      const streak  = loadStreak();
      const today   = new Date().toISOString().slice(0, 10);
      const last    = streak.lastCompleted ? new Date(streak.lastCompleted) : null;
      const now     = new Date(today);
      const daysDiff = last ? (now - last) / (1000 * 60 * 60 * 24) : Infinity;

      if (streak.lastCompleted === today) return; // already counted today

      const newCount = (daysDiff <= 9) ? streak.count + 1 : 1; // 9-day grace window
      saveStreak({ count: newCount, lastCompleted: today });
      renderStreakBadge(newCount);
    }

    let confettiFrame;

    function launchConfetti() {
      const canvas = document.getElementById('confettiCanvas');
      const ctx    = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors  = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#1dd1a1'];
      const pieces  = Array.from({ length: 90 }, () => ({
        x:     Math.random() * canvas.width,
        y:     Math.random() * canvas.height - canvas.height,
        w:     Math.random() * 10 + 5,
        h:     Math.random() * 6  + 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx:    (Math.random() - 0.5) * 3,
        vy:    Math.random() * 3 + 2,
        angle: Math.random() * 360,
        spin:  (Math.random() - 0.5) * 7,
      }));

      let elapsed = 0;
      cancelAnimationFrame(confettiFrame);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
          ctx.rotate(p.angle * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
          p.x     += p.vx;
          p.y     += p.vy;
          p.vy    += 0.07;
          p.angle += p.spin;
        });
        elapsed++;
        if (elapsed < 220) {
          confettiFrame = requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      draw();
    }

      const newVal = !item.checked;

        await sb(`items?id=eq.${id}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: { checked: newVal }

        item.checked = newVal;

        // Animate the row immediately without full re-render
        const checkEl = document.getElementById(`check-${id}`);
        const rowEl   = document.getElementById(`row-${id}`);
        const nameEl  = document.getElementById(`name-${id}`);

        if (checkEl) {
          checkEl.classList.toggle('checked', newVal);
          checkEl.textContent = newVal ? '✓' : '';
          checkEl.setAttribute('aria-checked', newVal ? 'true' : 'false');
          checkEl.setAttribute('aria-label', (newVal ? 'Uncheck' : 'Check off') + ' ' + item.name);
          checkEl.classList.remove('bouncing');

    async function importRecipe() {
      if (isBulkAdding) return;
      const raw = document.getElementById('recipeInput').value.trim();
      if (!raw) return;

      isBulkAdding = true;
      const isUrl = /^https?:\/\//i.test(raw);
      const btn = document.getElementById('importBtn');
      btn.textContent = t('recipe.importing');
      btn.disabled = true;

      try {
        const body = isUrl
          ? { url: raw, sections }
          : { text: raw, sections };

        const res = await fetch(PARSE_RECIPE_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        if (!res.ok || !data.items?.length) {
          setStatus(data.error || t('recipe.noItems'), !res.ok);
          return;
        }

        // Bulk-insert all parsed items
        for (const parsed of data.items) {
          const sec = sections.find(s => s.toLowerCase() === parsed.section.toLowerCase()) || sections[sections.length - 1];
          const sectionItems = items.filter(i => i.section === sec);
          const position = sectionItems.length > 0 ? Math.max(...sectionItems.map(i => i.position || 0)) + 1 : 0;
          const result = await sb('items?select=*', {
            method: 'POST',
            prefer: 'return=representation',
            body: { name: parsed.name, section: sec, emoji: parsed.emoji || '', quantity: parsed.quantity || 1, note: parsed.note || '', position },
          });
          const created = Array.isArray(result) ? result[0] : null;
          if (created) items.push(created);
        }

        setStatus(t('recipe.imported', { count: data.items.length }));
        toggleRecipeImport();
        updateUI();
      } catch (e) {
        setStatus(t('recipe.error'), true);
        console.error(e);
      } finally {
        btn.textContent = t('recipe.importBtn');
        btn.disabled = false;
        isBulkAdding = false;
      }
    }

    async function reorderItem(draggedId, targetId, targetSection, insertBefore) {
      const draggedItem = items.find(i => i.id === draggedId);
      if (!draggedItem) return;

      // Cross-section move: just update section
      if (draggedItem.section !== targetSection) {
        await moveItemToSection(draggedId, targetSection);
        return;
      }

      // Within-section reorder
      const sectionItems = items.filter(i => i.section === targetSection)
        .sort((a, b) => (a.position || 0) - (b.position || 0));

      const fromIdx = sectionItems.findIndex(i => i.id === draggedId);
      const toIdx   = sectionItems.findIndex(i => i.id === targetId);
      if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;

      // After splice(fromIdx,1) the target shifts left by 1 when fromIdx < toIdx.
      // adjustedToIdx points to the target in the post-removal array.
      const adjustedToIdx = toIdx - (fromIdx < toIdx ? 1 : 0);
      const insertIdx = insertBefore ? adjustedToIdx : adjustedToIdx + 1;

      sectionItems.splice(insertIdx, 0, sectionItems.splice(fromIdx, 1)[0]);
      sectionItems.forEach((item, idx) => { item.position = idx; });

      updateShoppingList();

      // Persist new positions in the background
      Promise.all(
        sectionItems.map(item =>
          sb(`items?id=eq.${item.id}`, { method: 'PATCH', prefer: 'return=minimal', body: { position: item.position } })
        )
      ).catch(e => console.error('Failed to persist order:', e));
    }

    async function updateQuantity(id, delta) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const newQty = Math.max(1, (item.quantity || 1) + delta);
      if (newQty === (item.quantity || 1)) return;
      try {
        await sb(`items?id=eq.${id}`, {
          method: 'PATCH',
          prefer: 'return=minimal',
          body: { quantity: newQty }
        });
        item.quantity = newQty;
        const qtyEl = document.getElementById(`qty-${id}`);
        if (qtyEl) qtyEl.textContent = newQty;
      } catch (e) {
        setStatus(t('status.errorUpdateQty'), true);
      }
    }

    // --- Realtime sync ---

    let realtimeChannel = null;

    function initRealtime() {
      if (!window.supabase?.createClient) return;
      const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      realtimeChannel = sbClient
        .channel('items-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'items' }, payload => {
          const { eventType, new: rec, old: old_ } = payload;
          if (eventType === 'INSERT') {
            if (!items.find(i => i.id === rec.id)) {
              items.push(rec);
              updateUI();
            }
          } else if (eventType === 'UPDATE') {
            const idx = items.findIndex(i => i.id === rec.id);
            if (idx !== -1) { items[idx] = rec; updateUI(); }
          } else if (eventType === 'DELETE') {
            if (items.some(i => i.id === old_.id)) {
              items = items.filter(i => i.id !== old_.id);
              updateUI();
            }
          }
        })
        .subscribe();
    }

    function updateShoppingList() {
      const container = document.getElementById('shoppingListContainer');
      const list = document.getElementById('shoppingList');

      if (items.length === 0) {
        container.classList.add('hidden');
        return;
      }

      container.classList.remove('hidden');
      list.innerHTML = '';

      // Auto-exit focus if the focused section no longer has any items
      if (focusSection && !items.some(i => i.section === focusSection)) {
        focusSection = null;
      }

      // Show/hide "Clear checked" button
      const anyChecked = items.some(i => i.checked);
      document.getElementById('clearCheckedBtn').classList.toggle('hidden', !anyChecked);

      // Focus banner — always visible when list is shown
      const banner = document.getElementById('focusBanner');
      const exitFocusBtn = document.getElementById('exitFocusBtn');
      banner.classList.remove('hidden');
      if (focusSection) {
        document.getElementById('focusBannerText').textContent = t('focus.focusingOn', { section: focusSection });
        exitFocusBtn.classList.remove('hidden');
      } else {
        document.getElementById('focusBannerText').textContent = t('focus.allSections');
        exitFocusBtn.classList.add('hidden');
      }

      const visibleSections = focusSection ? [focusSection] : sections;

      visibleSections.forEach(section => {
        const sectionItems = items.filter(item => item.section === section);
        if (sectionItems.length === 0) return;

        const isCollapsed = collapsedSections.has(section);

        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section-group' + (isCollapsed ? ' collapsed' : '');

        const header = document.createElement('div');
        header.className = 'section-header';
        header.setAttribute('role', 'button');
        header.setAttribute('tabindex', '0');
        header.setAttribute('aria-expanded', isCollapsed ? 'false' : 'true');

        const toggleCollapse = (e) => {
          // Don't collapse when clicking action buttons inside the header
          if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT') return;
          if (collapsedSections.has(section)) {
            collapsedSections.delete(section);
          } else {
            collapsedSections.add(section);
          }
          sectionDiv.classList.toggle('collapsed');
          header.setAttribute('aria-expanded', collapsedSections.has(section) ? 'false' : 'true');
        };
        header.onclick = toggleCollapse;
        header.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleCollapse(e); } };

        // Cross-section drop: drag an item onto the section header
        header.addEventListener('dragover', (e) => {
          if (draggedItemSection && draggedItemSection !== section) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            header.classList.add('drag-over');
          }
        });
        header.addEventListener('dragleave', () => header.classList.remove('drag-over'));
        header.addEventListener('drop', (e) => {
          e.preventDefault();
          header.classList.remove('drag-over');
          if (!draggedItemId || draggedItemSection === section) return;
          moveItemToSection(draggedItemId, section);
          draggedItemId = null;
        });

        const uncheckedCount = sectionItems.filter(i => !i.checked).length;
        const h3 = document.createElement('h3');
        const chevron = document.createElement('span');
        chevron.className = 'section-collapse-icon';
        chevron.setAttribute('aria-hidden', 'true');
        chevron.textContent = '▼';
        h3.appendChild(chevron);
        h3.appendChild(document.createTextNode(`${section} (${uncheckedCount}/${sectionItems.length})`));
        header.appendChild(h3);

        const headerBtns = document.createElement('div');
        headerBtns.style.display = 'flex';
        headerBtns.style.gap = '6px';
        headerBtns.style.alignItems = 'center';

        if (!focusSection) {
          const focusBtn = document.createElement('button');
          focusBtn.className = 'section-focus-btn';
          focusBtn.textContent = t('focus.focusBtn');
          focusBtn.setAttribute('aria-label', 'Focus on ' + section);
          focusBtn.onclick = () => enterFocus(section);
          headerBtns.appendChild(focusBtn);
        }

        const clearBtn = document.createElement('button');
        clearBtn.textContent = t('list.clearSection');
        clearBtn.setAttribute('aria-label', 'Clear all items from ' + section);
        clearBtn.onclick = () => clearSection(section);
        headerBtns.appendChild(clearBtn);
        header.appendChild(headerBtns);

        const itemsDiv = document.createElement('div');
        itemsDiv.className = 'section-items';

        sectionItems.forEach(item => {
          const row = document.createElement('div');
          row.className = 'item-row';
          row.id = `row-${item.id}`;
          row.draggable = true;

          // Drag handle
          const dragHandle = document.createElement('span');
          dragHandle.className = 'item-drag-handle';
          dragHandle.textContent = '⠿';
          dragHandle.setAttribute('aria-hidden', 'true');

          // Drag events
          row.addEventListener('dragstart', (e) => {
            draggedItemId = item.id;
            draggedItemSection = item.section;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setDragImage(row, 20, row.offsetHeight / 2);
            setTimeout(() => row.classList.add('dragging'), 0);
          });
          row.addEventListener('dragend', () => {
            row.classList.remove('dragging');
            document.querySelectorAll('.drag-over-above, .drag-over-below').forEach(el => {
              el.classList.remove('drag-over-above', 'drag-over-below');
            });
          });
          row.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (draggedItemId === item.id) return;
            e.dataTransfer.dropEffect = 'move';
            const rect = row.getBoundingClientRect();
            row.classList.remove('drag-over-above', 'drag-over-below');
            row.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
          });
          row.addEventListener('dragleave', () => {
            row.classList.remove('drag-over-above', 'drag-over-below');
          });
          row.addEventListener('drop', (e) => {
            e.preventDefault();
            const insertBefore = row.classList.contains('drag-over-above');
            row.classList.remove('drag-over-above', 'drag-over-below');
            if (!draggedItemId || draggedItemId === item.id) return;
            reorderItem(draggedItemId, item.id, item.section, insertBefore);
            draggedItemId = null;
          });

          const checkBtn = document.createElement('button');
          checkBtn.className = 'item-check' + (item.checked ? ' checked' : '');
          checkBtn.id = `check-${item.id}`;
          checkBtn.textContent = item.checked ? '✓' : '';
          checkBtn.setAttribute('role', 'checkbox');
          checkBtn.setAttribute('aria-checked', item.checked ? 'true' : 'false');
          checkBtn.setAttribute('aria-label', (item.checked ? 'Uncheck' : 'Check off') + ' ' + item.name);
          checkBtn.onclick = () => toggleCheck(item.id);

          const qtyDiv = document.createElement('div');
          qtyDiv.className = 'item-qty';

          const qtyMinus = document.createElement('button');
          qtyMinus.className = 'item-qty-btn';
          qtyMinus.textContent = '−';
          qtyMinus.setAttribute('aria-label', t('item.decreaseQty', { name: item.name }));
          qtyMinus.onclick = () => updateQuantity(item.id, -1);

          const qtyVal = document.createElement('span');
          qtyVal.className = 'item-qty-value';
          qtyVal.id = `qty-${item.id}`;
          qtyVal.textContent = item.quantity || 1;

          const qtyPlus = document.createElement('button');
          qtyPlus.className = 'item-qty-btn';
          qtyPlus.textContent = '+';
          qtyPlus.setAttribute('aria-label', t('item.increaseQty', { name: item.name }));
          qtyPlus.onclick = () => updateQuantity(item.id, 1);

          qtyDiv.append(qtyMinus, qtyVal, qtyPlus);

          const nameSpan = document.createElement('span');
          nameSpan.className = 'item-name' + (item.checked ? ' checked' : '');
          nameSpan.id = `name-${item.id}`;
          if (item.emoji) {
            const emojiSpan = document.createElement('span');
            emojiSpan.className = 'item-emoji';
            emojiSpan.textContent = item.emoji;
            nameSpan.appendChild(emojiSpan);
          }
          nameSpan.appendChild(document.createTextNode(item.name));
          if (item.note) {
            const noteSpan = document.createElement('span');
            noteSpan.className = 'item-note';
            noteSpan.textContent = item.note;
            nameSpan.appendChild(noteSpan);
          }

          const actions = document.createElement('div');
          actions.className = 'item-actions';

          const findLink = document.createElement('a');
          findLink.href = generateStoreLink(item.name);
          findLink.target = '_blank';
          findLink.rel = 'noopener noreferrer';
          findLink.className = 'action-btn find';
          findLink.appendChild(document.createTextNode('Find '));
          const storeLabel = document.createElement('span');
          storeLabel.className = 'store-label';
          storeLabel.textContent = `at ${resolveStore().name}`;
          findLink.appendChild(storeLabel);

          const copyBtn = document.createElement('button');
          copyBtn.id = `copy-${item.id}`;
          copyBtn.className = 'action-btn copy';
          copyBtn.textContent = t('item.copy');
          copyBtn.onclick = () => copyToClipboard(item.name, item.id);

          const heartBtn = document.createElement('button');
          heartBtn.className = 'action-btn heart';
          heartBtn.setAttribute('aria-label', t('item.favorite') + ': ' + item.name);
          heartBtn.textContent = '♡';
          heartBtn.onclick = () => addToFavorites(item.id);

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'action-btn delete';
          deleteBtn.setAttribute('aria-label', 'Delete ' + item.name);
          deleteBtn.textContent = t('item.delete');
          deleteBtn.onclick = () => deleteItem(item.id);

          const sectionPicker = document.createElement('select');
          sectionPicker.className = 'item-section-select';
          sectionPicker.id   = `section-picker-${item.id}`;
          sectionPicker.name = `section-picker-${item.id}`;
          sectionPicker.setAttribute('aria-label', 'Move ' + item.name + ' to section');
          sections.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            if (s === item.section) opt.selected = true;
            sectionPicker.appendChild(opt);
          });
          sectionPicker.onchange = () => moveItemToSection(item.id, sectionPicker.value);

          actions.append(findLink, copyBtn, heartBtn, deleteBtn, sectionPicker);
          row.append(dragHandle, checkBtn, qtyDiv, nameSpan, actions);
          itemsDiv.appendChild(row);
        });

        sectionDiv.appendChild(header);
        sectionDiv.appendChild(itemsDiv);
        list.appendChild(sectionDiv);
      });
    }

    function updateSectionsManager() {
      const container = document.getElementById('sectionsContainer');
      container.innerHTML = '';
      sections.forEach(section => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        const label = document.createElement('span');
        label.textContent = section;
        const btn = document.createElement('button');
        btn.textContent = '✕';
        btn.setAttribute('aria-label', 'Remove section ' + section);
        btn.onclick = () => deleteSection(section);
        tag.append(label, btn);
        container.appendChild(tag);
      });
    }

    function updateFavoritesUI() {
      const container = document.getElementById('favoritesContainer');
      container.innerHTML = '';
      if (favorites.length === 0) {
        const emptyP = document.createElement('p');
        emptyP.className = 'empty-state';
        emptyP.textContent = t('favorites.emptyState');
        container.appendChild(emptyP);
        return;
      }
      const list = document.createElement('div');
      list.className = 'fav-list';
      favorites.forEach(fav => {
        const item = document.createElement('div');
        item.className = 'fav-item';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'fav-name';
        const favNameSpan = document.createElement('span');
        favNameSpan.textContent = fav.name;
        const favSectionSpan = document.createElement('span');
        favSectionSpan.className = 'fav-section';
        favSectionSpan.textContent = fav.section;
        nameDiv.append(favNameSpan, favSectionSpan);
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'fav-delete';
        deleteBtn.textContent = '✕';
        deleteBtn.setAttribute('aria-label', 'Remove ' + fav.name + ' from favorites');
        deleteBtn.onclick = () => removeFavorite(fav.id);
        item.append(nameDiv, deleteBtn);
        list.appendChild(item);
      });
      container.appendChild(list);
    }

    function updateQuickAdd() {
      const container = document.getElementById('quickAddContainer');
      const buttons = document.getElementById('quickAddButtons');
      if (favorites.length === 0) {
        container.classList.add('hidden');
        return;
      }
      container.classList.remove('hidden');
      buttons.innerHTML = '';
      favorites.slice(0, 8).forEach(fav => {
        const btn = document.createElement('button');
        btn.className = 'quick-add-btn';
        btn.textContent = fav.emoji ? `${fav.emoji} ${fav.name}` : `+ ${fav.name}`;
        btn.onclick = () => addFavoriteToList(fav.id);
        buttons.appendChild(btn);
      });
    }

    function updateTemplatesUI() {
      const container = document.getElementById('templatesContainer');
      container.innerHTML = '';
      if (templates.length === 0) {
        const p = document.createElement('p');
        p.className = 'empty-state';
        p.textContent = t('templates.emptyState');
        container.appendChild(p);
        return;
      }
      const list = document.createElement('div');
      list.className = 'template-list';
      templates.forEach(tmpl => {
        const item = document.createElement('div');
        item.className = 'template-item';

        const meta = document.createElement('div');
        meta.className = 'template-meta';
        const nameEl = document.createElement('div');
        nameEl.className = 'template-name';
        nameEl.textContent = tmpl.name;
        const countEl = document.createElement('div');
        countEl.className = 'template-count';
        countEl.textContent = `${tmpl.items?.length ?? 0} items`;
        meta.append(nameEl, countEl);

        const actions = document.createElement('div');
        actions.className = 'template-actions';

        const loadBtn = document.createElement('button');
        loadBtn.className = 'template-load-btn action-btn';
        loadBtn.textContent = t('templates.loadBtn');
        loadBtn.setAttribute('aria-label', `Load template ${tmpl.name}`);
        loadBtn.onclick = () => loadTemplate(tmpl.id);

        const delBtn = document.createElement('button');
        delBtn.className = 'template-delete-btn';
        delBtn.textContent = '✕';
        delBtn.setAttribute('aria-label', `Delete template ${tmpl.name}`);
        delBtn.onclick = () => deleteTemplate(tmpl.id);

        actions.append(loadBtn, delBtn);
        item.append(meta, actions);
        list.appendChild(item);
      });
      container.appendChild(list);
    }

    // --- Meal Spinner ---

    let mealSpinnerOpen = false;
    let shownMeals = [];
    const MEAL_SHOW_COUNT = 5;

    function openMealSpinner() {
      mealSpinnerOpen = true;
      document.getElementById('mealSpinnerCard').classList.remove('hidden');
      shuffleMeals();
    }

    function closeMealSpinner() {
      mealSpinnerOpen = false;
      document.getElementById('mealSpinnerCard').classList.add('hidden');
    }

    function shuffleMeals() {
      const pool = [...MEALS];
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      shownMeals = pool.slice(0, MEAL_SHOW_COUNT).map(m => ({ ...m, selected: false }));
      renderMealGrid();
    }

    function toggleMealSelection(index) {
      shownMeals[index].selected = !shownMeals[index].selected;
      const card = document.getElementById('meal-card-' + index);
      if (card) {
        card.classList.toggle('selected', shownMeals[index].selected);
        const circle = card.querySelector('.meal-check-circle');
        if (circle) circle.textContent = shownMeals[index].selected ? '✓' : '';
      }
    }

    function renderMealGrid() {
      const grid = document.getElementById('mealGrid');
      grid.innerHTML = shownMeals.map((meal, i) => {
        const tags = meal.tags.map(tag => '<span class="meal-tag">' + tag + '</span>').join('');
        return '<div class="meal-card' + (meal.selected ? ' selected' : '') + '" id="meal-card-' + i + '" onclick="toggleMealSelection(' + i + ')">'
          + '<div class="meal-check-circle">' + (meal.selected ? '✓' : '') + '</div>'
          + '<div class="meal-info">'
          + '<div class="meal-name">' + meal.name + '</div>'
          + '<div class="meal-tags">' + tags + '</div>'
          + '</div></div>';
      }).join('');
    }

    async function addMealsToList() {
      if (isBulkAdding) return;
      const selected = shownMeals.filter(m => m.selected);
      if (selected.length === 0) {
        setStatus('Select at least one meal first.', true);
        return;
      }
      isBulkAdding = true;
      const btn = document.getElementById('addMealsBtn');
      btn.textContent = 'Adding...';
      btn.disabled = true;
      try {
        let addedCount = 0;
        for (const meal of selected) {
          for (const ingredient of meal.ingredients) {
            if (items.some(i => i.name.toLowerCase() === ingredient.toLowerCase())) continue;
            const sec = fallbackCategorize(ingredient) || sections[sections.length - 1];
            const sectionItems = items.filter(i => i.section === sec);
            const position = sectionItems.length > 0 ? Math.max(...sectionItems.map(i => i.position || 0)) + 1 : 0;
            const result = await sb('items?select=*', {
              method: 'POST',
              prefer: 'return=representation',
              body: { name: ingredient, section: sec, emoji: '', position },
            });
            const created = Array.isArray(result) ? result[0] : null;
            if (created) { items.push(created); addedCount++; }
          }
        }
        const mealWord = selected.length === 1 ? 'meal' : 'meals';
        setStatus('Added ' + addedCount + ' ingredient' + (addedCount !== 1 ? 's' : '') + ' from ' + selected.length + ' ' + mealWord + '.');
        closeMealSpinner();
        updateUI();
      } catch (e) {
        setStatus('Error adding ingredients.', true);
        console.error(e);
      } finally {
        if (btn) { btn.textContent = 'Add to list'; btn.disabled = false; }
        isBulkAdding = false;
      }
    }

    // --- Escape key: dismiss modals and forms in priority order ---
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (document.getElementById('celebration').classList.contains('visible')) {
        dismissCelebration();
      } else if (!document.getElementById('saveTemplateModal').classList.contains('hidden')) {
        closeSaveTemplateModal();
      } else if (recipeImportOpen) {
        toggleRecipeImport();
      } else if (!document.getElementById('addSectionForm').classList.contains('hidden')) {
        cancelAddSection();
      } else if (focusSection) {
        exitFocus();
      }
    });

    // --- Celebration focus trap: keep Tab within the modal while it's visible ---
    document.getElementById('celebration').addEventListener('keydown', (e) => {
      if (e.key !== 'Tab') return;
      const btn = document.getElementById('celebrationBtn');
      e.preventDefault();
      btn.focus();
    });

    // Initialize
    loadSavedTheme();
    applyTheme();
    applyIdentity();
    renderThemePicker();
    initStreak();
    loadData().then(initRealtime);

    // Register service worker for offline/PWA support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed:', e));
    }
  </script>
</body>
